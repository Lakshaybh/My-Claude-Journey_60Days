<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Supply Chain Builder</title>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  :root{
    /* branding-style.md - Light (default) theme, EXL orange */
    --bg-base:#F7F8FA; --bg-surface:#FFFFFF; --bg-card:#FFFFFF; --bg-card-hover:#FBFAF8;
    --border-subtle:#E7E9EE; --border-active:#D4D8E0;
    --accent:#FF6633; --accent-hover:#FF7D52; --accent-dim:#E04E1F; --accent-glow:rgba(255,102,51,0.18);
    --accent-soft:rgba(255,102,51,0.08);
    --danger:#E04545; --danger-soft:rgba(224,69,69,0.07);
    --text-primary:#0B1B33; --text-secondary:#5A6577; --text-muted:#9AA3B2;
    --serif:"Tiempos Text",Georgia,"Times New Roman",serif;
    --sans:ui-sans-serif,-apple-system,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;
    --track:rgba(11,27,51,.07);
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{background:var(--bg-base);color:var(--text-primary);
    font-family:var(--sans);-webkit-font-smoothing:antialiased;}
  body{min-height:100vh;}
  #root{max-width:1080px;margin:0 auto;padding:18px 20px 56px;}
  ::selection{background:var(--accent-glow);}
  :focus-visible{outline:2px solid var(--accent);outline-offset:2px;border-radius:6px;}
  svg{stroke:currentColor;}

  .screen{animation:enter .28s cubic-bezier(0.16,1,0.3,1);}
  @keyframes enter{from{opacity:0;transform:translateY(12px) scale(.99);}to{opacity:1;transform:none;}}

  /* compact app header */
  .app-head{display:flex;align-items:center;gap:10px;padding:6px 2px 16px;border-bottom:1px solid var(--border-subtle);margin-bottom:20px;}
  .logo-dot{width:30px;height:30px;border-radius:8px;background:var(--accent);flex:none;
    display:flex;align-items:center;justify-content:center;color:#fff;box-shadow:0 3px 10px var(--accent-glow);}
  .app-head h1{font-size:15.5px;font-weight:700;letter-spacing:-.01em;}
  .app-head .sub{font-size:12px;color:var(--text-muted);margin-left:auto;}

  .card{background:var(--bg-card);border:1px solid var(--border-subtle);border-radius:14px;
    padding:22px 24px;box-shadow:0 1px 2px rgba(11,27,51,.04),0 6px 18px rgba(11,27,51,.05);}
  .card.pad-lg{padding:28px 30px;}
  .card+.card,.mt{margin-top:16px;}
  .mt-lg{margin-top:22px;}

  .btn{font-family:var(--sans);font-weight:600;font-size:13.5px;border-radius:10px;padding:11px 22px;
    border:1px solid transparent;cursor:pointer;transition:all .18s ease;display:inline-flex;
    align-items:center;gap:8px;}
  .btn-primary{background:var(--accent);color:#fff;box-shadow:0 3px 10px var(--accent-glow);}
  .btn-primary:hover{background:var(--accent-hover);transform:translateY(-2px);box-shadow:0 7px 18px var(--accent-glow);}
  .btn-lg{font-size:14px;padding:13px 28px;}
  .btn:disabled{opacity:.4;cursor:not-allowed;transform:none;box-shadow:none;}

  .eyebrow{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--accent);font-weight:700;
    display:inline-flex;align-items:center;gap:6px;}
  .lead{font-size:15px;line-height:1.65;color:var(--text-secondary);}
  h2.title{font-family:var(--serif);font-size:28px;font-weight:600;letter-spacing:-.02em;margin:8px 0 4px;color:var(--text-primary);}
  h3.sub-title{font-family:var(--serif);font-size:21px;font-weight:600;letter-spacing:-.01em;color:var(--text-primary);
    display:flex;align-items:center;gap:9px;}
  h3.sub-title .dic{color:var(--accent);}

  .grid{display:grid;gap:14px;}
  @media(min-width:680px){.grid-2{grid-template-columns:1fr 1fr;}.grid-3{grid-template-columns:1fr 1fr 1fr;}}

  /* 3-beat teaching block */
  .beats{display:grid;gap:10px;margin:14px 0 4px;}
  @media(min-width:680px){.beats{grid-template-columns:repeat(3,1fr);}}
  .beat{background:var(--bg-surface);border:1px solid var(--border-subtle);border-radius:11px;padding:13px 15px;}
  .beat .bk{font-size:10.5px;letter-spacing:.08em;text-transform:uppercase;font-weight:700;color:var(--accent);
    margin-bottom:6px;display:flex;align-items:center;gap:6px;}
  .beat .bv{font-size:13px;line-height:1.55;color:var(--text-secondary);}

  .choice{background:var(--bg-card);border:1.5px solid var(--border-subtle);border-radius:12px;
    padding:16px 18px;cursor:pointer;transition:all .18s cubic-bezier(0.16,1,0.3,1);text-align:left;
    font-family:inherit;color:inherit;display:block;width:100%;}
  .choice:hover{border-color:var(--accent);box-shadow:0 0 0 1px var(--accent-glow),0 8px 20px rgba(11,27,51,.08);
    transform:translateY(-2px);background:var(--bg-card-hover);}
  .choice.selected{background:var(--accent-soft);border-color:var(--accent);box-shadow:0 0 0 1px var(--accent);}
  .choice .c-label{font-weight:700;font-size:15px;margin-bottom:5px;display:flex;align-items:center;gap:8px;color:var(--text-primary);}
  .choice .c-desc{font-size:12.5px;color:var(--text-secondary);line-height:1.5;}
  .choice .pick{margin-left:auto;font-size:11px;color:var(--accent);font-weight:700;opacity:0;transition:.2s;
    display:inline-flex;align-items:center;gap:4px;}
  .choice.selected .pick{opacity:1;}

  /* metric rows (decision live panel) - orange only, width = goodness */
  .metrics-panel{display:flex;flex-direction:column;gap:13px;}
  .metric-top{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:5px;}
  .metric-name{font-size:12.5px;color:var(--text-secondary);font-weight:600;display:flex;align-items:center;gap:6px;}
  .metric-name svg{color:var(--accent);}
  .metric-val{font-size:13px;font-weight:700;font-variant-numeric:tabular-nums;color:var(--text-primary);}
  .track{height:8px;background:var(--track);border-radius:999px;overflow:hidden;position:relative;}
  .fill{height:100%;border-radius:999px;background:var(--accent);
    width:0;transition:width .7s cubic-bezier(0.16,1,0.3,1);}

  .tradeoff{margin-top:16px;background:var(--accent-soft);border:1px solid var(--accent-glow);
    border-radius:11px;padding:14px 16px;font-size:13.5px;line-height:1.6;color:var(--text-primary);
    animation:enter .3s ease;}
  .tradeoff b{color:var(--accent-dim);}
  .delta-row{display:flex;flex-wrap:wrap;gap:7px;margin-top:12px;}
  .dchip{display:inline-flex;align-items:center;gap:5px;font-size:11.5px;font-weight:700;
    border-radius:999px;padding:4px 10px;font-variant-numeric:tabular-nums;border:1px solid;}
  .dchip.up{background:var(--accent-soft);color:var(--accent-dim);border-color:var(--accent-glow);}
  .dchip.down{background:var(--bg-surface);color:var(--text-muted);border-color:var(--border-active);}

  .company-row{display:flex;flex-wrap:wrap;gap:12px;margin-top:16px;}
  .fact{flex:1;min-width:150px;background:var(--bg-surface);border:1px solid var(--border-subtle);
    border-radius:11px;padding:12px 14px;display:flex;gap:11px;align-items:center;}
  .fact .fic{width:30px;height:30px;border-radius:8px;background:var(--accent-soft);color:var(--accent);
    display:flex;align-items:center;justify-content:center;flex:none;}
  .fact .k{font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--text-muted);font-weight:700;}
  .fact .v{font-size:14px;font-weight:700;margin-top:2px;}
  .pill{display:inline-flex;align-items:center;gap:5px;background:var(--bg-surface);border:1px solid var(--border-subtle);
    color:var(--text-primary);border-radius:999px;padding:4px 12px;font-size:12px;margin:4px 5px 0 0;font-weight:600;}
  .pill svg{color:var(--accent);}
  .pill.demand{background:var(--accent-soft);border-color:var(--accent-glow);color:var(--accent-dim);}

  .progress-steps{display:flex;gap:6px;margin-bottom:18px;}
  .pstep{flex:1;height:5px;border-radius:999px;background:var(--track);overflow:hidden;}
  .pstep .pf{display:block;height:100%;background:var(--accent);width:0;transition:width .5s ease;}

  .section-label{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--text-muted);font-weight:700;}
  .sec-h{display:flex;align-items:center;gap:8px;margin-bottom:14px;}
  .sec-h svg{color:var(--accent);}

  /* ===== EXECUTIVE DASHBOARD ===== */
  .exec-hero{display:grid;gap:18px;align-items:center;}
  @media(min-width:760px){.exec-hero{grid-template-columns:1fr auto;}}
  .summary{font-size:15px;line-height:1.6;color:var(--text-secondary);margin:8px 0 14px;max-width:54ch;}
  .summary b{color:var(--text-primary);}
  .chips{display:flex;flex-wrap:wrap;gap:10px;}
  .chip{display:flex;align-items:center;gap:9px;background:var(--bg-surface);border:1px solid var(--border-subtle);
    border-radius:11px;padding:9px 13px;}
  .chip .cic{color:var(--accent);display:flex;}
  .chip .ck{font-size:9.5px;letter-spacing:.09em;text-transform:uppercase;color:var(--text-muted);font-weight:700;}
  .chip .cv{font-size:13px;font-weight:700;color:var(--text-primary);}

  .gauge-wrap{display:flex;flex-direction:column;align-items:center;}
  .gauge{width:172px;height:172px;border-radius:50%;display:flex;align-items:center;justify-content:center;position:relative;}
  .gauge::before{content:"";position:absolute;inset:15px;border-radius:50%;background:var(--bg-card);}
  .gauge-inner{position:relative;text-align:center;}
  .gauge-score{font-family:var(--serif);font-size:46px;font-weight:600;letter-spacing:-.03em;line-height:1;
    font-variant-numeric:tabular-nums;color:var(--accent);}
  .gauge-of{font-size:11px;color:var(--text-muted);}
  .grade-badge{display:inline-flex;align-items:center;gap:6px;margin-top:12px;padding:6px 15px;border-radius:999px;
    font-weight:700;font-size:13px;background:var(--accent-soft);color:var(--accent-dim);border:1px solid var(--accent-glow);}

  .dash-2{display:grid;gap:16px;}
  @media(min-width:760px){.dash-2{grid-template-columns:1.3fr 1fr;align-items:stretch;}}
  .radar-card{display:flex;align-items:center;justify-content:center;}

  .kpi-grid{display:grid;gap:11px;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));}
  .kpi{background:var(--bg-surface);border:1px solid var(--border-subtle);border-radius:12px;padding:13px 14px;}
  .kpi .kh{display:flex;align-items:center;gap:7px;color:var(--text-secondary);font-size:11.5px;font-weight:600;margin-bottom:7px;}
  .kpi .kh svg{color:var(--accent);}
  .kpi .kv{font-size:25px;font-weight:800;font-variant-numeric:tabular-nums;letter-spacing:-.02em;line-height:1;color:var(--text-primary);}
  .kpi .ks{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;margin-top:3px;}
  .kpi .ks.strong{color:var(--accent);} .kpi .ks.fair{color:var(--text-secondary);} .kpi .ks.weak{color:var(--text-muted);}
  .kpi .ktrack{height:7px;background:var(--track);border-radius:999px;margin-top:10px;position:relative;overflow:visible;}
  .kpi .kfill{height:100%;background:var(--accent);border-radius:999px;width:0;transition:width .8s cubic-bezier(.16,1,.3,1);}
  .kpi .kbench{position:absolute;top:-3px;height:13px;left:50%;width:2px;background:var(--border-active);border-radius:2px;}

  .recap{display:grid;gap:10px;grid-template-columns:repeat(auto-fit,minmax(165px,1fr));}
  .recap-chip{display:flex;align-items:center;gap:11px;background:var(--bg-surface);border:1px solid var(--border-subtle);
    border-radius:11px;padding:11px 13px;}
  .recap-chip .ri{width:32px;height:32px;border-radius:8px;background:var(--accent-soft);color:var(--accent);
    display:flex;align-items:center;justify-content:center;flex:none;}
  .recap-chip .rk{font-size:9.5px;letter-spacing:.07em;text-transform:uppercase;color:var(--text-muted);font-weight:700;}
  .recap-chip .rv{font-size:13px;font-weight:700;color:var(--text-primary);margin-top:1px;}

  .sw-item{display:flex;gap:10px;align-items:flex-start;padding:9px 0;font-size:13.5px;line-height:1.5;
    color:var(--text-primary);border-bottom:1px solid var(--border-subtle);}
  .sw-item:last-child{border-bottom:none;}
  .sw-item svg{flex:none;margin-top:1px;}
  .sw-item.good svg{color:var(--accent);}
  .sw-item.bad svg{color:var(--text-muted);}

  .risk-callout{background:var(--danger-soft);border:1px solid rgba(224,69,69,.28);border-left:4px solid var(--danger);
    border-radius:11px;padding:15px 17px;display:flex;gap:12px;align-items:flex-start;}
  .risk-callout .ric{color:var(--danger);flex:none;margin-top:1px;}
  .risk-callout .rt{font-weight:700;font-size:15px;margin-bottom:3px;}

  .imp-card{background:var(--bg-surface);border:1px solid var(--border-subtle);border-radius:11px;padding:15px 16px;transition:.18s;}
  .imp-card:hover{border-color:var(--accent);transform:translateY(-2px);background:var(--bg-card-hover);}
  .imp-head{display:flex;align-items:center;gap:9px;margin-bottom:8px;}
  .imp-head .num{width:24px;height:24px;border-radius:7px;background:var(--accent);color:#fff;
    display:inline-flex;align-items:center;justify-content:center;font-weight:800;font-size:12px;flex:none;}
  .imp-head .it{font-weight:700;font-size:13.5px;color:var(--text-primary);}
  .imp-card .id{font-size:12.5px;color:var(--text-secondary);line-height:1.55;}

  .rotating{display:inline-flex;transition:transform .5s;}
  .btn-primary:hover .rotating{transform:rotate(-180deg);}
  .center{text-align:center;}
  .row-between{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:14px;}
</style>
</head>

const rand=a=>a[Math.floor(Math.random()*a.length)];
function pickN(arr,n){const c=[...arr],o=[];for(let i=0;i<n&&c.length;i++)o.push(c.splice(Math.floor(Math.random()*c.length),1)[0]);return o;}
function weightedDemand(bias){
  const t={low:[["low",4],["medium",4],["high",2]],medium:[["low",2],["medium",5],["high",3]],high:[["low",1],["medium",3],["high",6]]}[bias];
  const total=t.reduce((s,x)=>s+x[1],0);let r=Math.random()*total;
  for(const[k,w]of t){if(r<w)return k;r-=w;}return"medium";
}
function generateCompany(){
  const ind=rand(INDUSTRIES);
  let suffPool=SUFFIX_BY_SECTOR.default;
  if(/Electronics|Renewable|Aerospace|Machinery/.test(ind.name))suffPool=SUFFIX_BY_SECTOR.tech;
  else if(/Pharma|Medical/.test(ind.name))suffPool=SUFFIX_BY_SECTOR.med;
  else if(/Apparel|Packaged|Food/.test(ind.name))suffPool=SUFFIX_BY_SECTOR.brand;
  const name=rand(PREFIX)+" "+rand(suffPool);
  return {
    name, industry:ind.name, flavor:ind.flavor,
    products:pickN(ind.products,1+Math.floor(Math.random()*3)),
    markets:pickN(ind.markets,2+Math.floor(Math.random()*3)),

const METRIC_KEYS=["cost","deliverySpeed","risk","customerSat","sustainability"];
const METRIC_LABELS={cost:"Cost",deliverySpeed:"Delivery Speed",risk:"Risk",customerSat:"Customer Satisfaction",sustainability:"Sustainability"};
const METRIC_SHORT={cost:"Cost",deliverySpeed:"Speed",risk:"Risk",customerSat:"Cust. Sat.",sustainability:"Sustain."};
const DEC_SHORT={suppliers:"sourcing",factory:"factory location",warehouse:"warehousing",transport:"transport",inventory:"inventory"};
const LOWER_BETTER={cost:true,risk:true};
const SCORE_W={cost:.20,deliverySpeed:.20,risk:.25,customerSat:.25,sustainability:.10};
const DEMAND_OFFSETS={
  low:{cost:-5,deliverySpeed:0,risk:-5,customerSat:-5,sustainability:5},
  medium:{cost:0,deliverySpeed:0,risk:0,customerSat:0,sustainability:0},
  high:{cost:8,deliverySpeed:5,risk:8,customerSat:8,sustainability:-8}
};
const DEMAND_MULT={
  low:{cost:1,deliverySpeed:.8,risk:.8,customerSat:.8,sustainability:1},
  medium:{cost:1,deliverySpeed:1,risk:1,customerSat:1,sustainability:1},
  high:{cost:1.2,deliverySpeed:1.3,risk:1.3,customerSat:1.2,sustainability:1}
};
const clamp=v=>Math.max(0,Math.min(100,v));
function applyDelta(metrics,delta,demand){
  const m=DEMAND_MULT[demand];const out={...metrics};
  for(const k of METRIC_KEYS) out[k]=clamp(out[k]+(delta[k]||0)*m[k]);
  return out;
}
function baseMetricsFor(demand){
  const out={};for(const k of METRIC_KEYS)out[k]=clamp(50+(DEMAND_OFFSETS[demand][k]||0));return out;
}
const goodness=(k,v)=>LOWER_BETTER[k]?100-v:v;
function overallScore(m){
  return Math.round((100-m.cost)*0.20 + m.deliverySpeed*0.20 + (100-m.risk)*0.25 + m.customerSat*0.25 + m.sustainability*0.10);
}
function gradeFor(s){
  if(s>=85)return{grade:"A+",label:"World-Class"};
  if(s>=75)return{grade:"A",label:"High-Performing"};
  if(s>=65)return{grade:"B",label:"Solid"};
  if(s>=55)return{grade:"C",label:"Average"};
  if(s>=45)return{grade:"D",label:"At-Risk"};
  return{grade:"F",label:"Critical"};
}
function statusOf(k,m){const g=goodness(k,m[k]);return g>=66?"Strong":g>=40?"Fair":"Weak";}

/* ===== dynamic, decision-aware report ===== */
function contribution(opt){return METRIC_KEYS.reduce((s,k)=>{const dir=LOWER_BETTER[k]?-1:1;return s+dir*opt.delta[k]*SCORE_W[k];},0);}
function metricEffect(opt,k){const dir=LOWER_BETTER[k]?-1:1;return dir*opt.delta[k];} // higher = better for that metric

function improvementForMetric(k,chosen){
  let hurt=null,hurtScore=-Infinity;
  chosen.forEach(c=>{const harm=-metricEffect(c.o,k);if(harm>hurtScore){hurtScore=harm;hurt=c;}});
  if(!hurt||hurtScore<=0) return {icon:METRIC_ICON[k],title:GENERIC_IMP[k].title,body:GENERIC_IMP[k].body};
  let better=hurt.d.options[0];
  hurt.d.options.forEach(o=>{if(metricEffect(o,k)>metricEffect(better,k))better=o;});
  if(better.id===hurt.o.id) return {icon:METRIC_ICON[k],title:GENERIC_IMP[k].title,body:GENERIC_IMP[k].body};
  return {icon:METRIC_ICON[k],title:`Lift your ${METRIC_LABELS[k]}`,
    body:`For ${DEC_SHORT[hurt.d.id]} you chose ${hurt.o.label}. Switching to ${better.label} would raise your ${METRIC_LABELS[k].toLowerCase()}.`};
}

function buildReport(metrics,choices){
  const score=overallScore(metrics);
  const ranked=[...METRIC_KEYS].sort((a,b)=>goodness(b,metrics[b])-goodness(a,metrics[a]));
  const best=ranked[0], worst=ranked[ranked.length-1];
  const chosen=choices.map(c=>({d:findDecision(c.decision),o:findOption(findDecision(c.decision),c.option)}));
  const byContribution=[...chosen].sort((a,b)=>contribution(b.o)-contribution(a.o));
  const bestDec=byContribution[0], worstDec=byContribution[byContribution.length-1];

  const strengths=[];
  strengths.push({icon:METRIC_ICON[best],text:`${METRIC_LABELS[best]} is your strongest area at ${Math.round(metrics[best])}.`});
  if(bestDec && contribution(bestDec.o)>0)
    strengths.push({icon:DEC_ICON[bestDec.d.id],text:`Choosing ${bestDec.o.label} for ${DEC_SHORT[bestDec.d.id]} strengthened the chain.`});
  ranked.filter(k=>k!==best && goodness(k,metrics[k])>=70).slice(0,1)
    .forEach(k=>strengths.push({icon:METRIC_ICON[k],text:`${METRIC_LABELS[k]} is also performing well (${Math.round(metrics[k])}).`}));

  const weaknesses=[];
  weaknesses.push({icon:METRIC_ICON[worst],text:`${METRIC_LABELS[worst]} is your weakest area at ${Math.round(metrics[worst])}.`});
  if(worstDec && contribution(worstDec.o)<0)
    weaknesses.push({icon:DEC_ICON[worstDec.d.id],text:`${worstDec.o.label} for ${DEC_SHORT[worstDec.d.id]} is holding performance back.`});
  ranked.filter(k=>k!==worst && goodness(k,metrics[k])<=40).slice(0,1)
    .forEach(k=>weaknesses.push({icon:METRIC_ICON[k],text:`${METRIC_LABELS[k]} also needs attention (${Math.round(metrics[k])}).`}));

  const weak3=ranked.slice(-3).reverse();
  const improvements=weak3.map(k=>improvementForMetric(k,chosen));

  const summary=(<span>A <b>{METRIC_LABELS[best].toLowerCase()}</b>-led supply chain, held back by <b>{METRIC_LABELS[worst].toLowerCase()}</b>. It scores {score} of 100, a {gradeFor(score).label.toLowerCase()} result.</span>);
  return {score,best,worst,strengths,weaknesses,risk:RISK_TEXT[worst],improvements,summary,chosen};
}

function MetricBar({mkey,value}){
  const [w,setW]=useState(0);
  const g=goodness(mkey,value);
  useEffect(()=>{const t=requestAnimationFrame(()=>setW(g));return()=>cancelAnimationFrame(t);},[g]);
  const Ic=METRIC_ICON[mkey];
  return (
    <div>
      <div className="metric-top">
        <span className="metric-name"><Ic/> {METRIC_LABELS[mkey]}{LOWER_BETTER[mkey]?" (lower is better)":""}</span>
        <span className="metric-val">{Math.round(value)}</span>
      </div>
      <div className="track"><div className="fill" style={{width:w+"%"}}/></div>
    </div>
  );
}
function MetricsPanel({metrics}){
  return <div className="metrics-panel">{METRIC_KEYS.map(k=><MetricBar key={k} mkey={k} value={metrics[k]}/>)}</div>;
}
function ChoiceCard({opt,selected,onSelect}){
  return (
    <button className={"choice"+(selected?" selected":"")} onClick={onSelect}>
      <div className="c-label">{opt.label}<span className="pick"><Check/> SELECTED</span></div>
      <div className="c-desc">{opt.desc}</div>
    </button>
  );
}
function DeltaChips({before,after}){
  return (
    <div className="delta-row">
      {METRIC_KEYS.map(k=>{
        const d=Math.round(after[k])-Math.round(before[k]);
        if(d===0)return null;
        const improved=LOWER_BETTER[k]?d<0:d>0;
        return <span key={k} className={"dchip "+(improved?"up":"down")}>{METRIC_SHORT[k]} {d>0?"+":""}{d}</span>;
      })}
    </div>
  );
}

function DecisionScreen({index,decision,committed,demand,onNext}){

  useEffect(()=>{setPicked(null);},[decision.id]);
  const pickedOpt=decision.options.find(o=>o.id===picked);
  const preview=pickedOpt?applyDelta(committed,pickedOpt.delta,demand):committed;
  const Dic=DEC_ICON[decision.id];
  return (
    <div className="screen">
      <div className="progress-steps">
        {[0,1,2,3,4].map(i=>(
          <div className="pstep" key={i}><span className="pf" style={{width:i<index?"100%":i===index&&picked?"100%":i===index?"50%":"0%"}}/></div>
        ))}
      </div>

        <div className="card">

          <div className="beats">
            <div className="beat"><div className="bk"><Info/> What it is</div><div className="bv">{decision.concept}</div></div>
            <div className="beat"><div className="bk"><Target size={13}/> Why it matters</div><div className="bv">{decision.why}</div></div>
            <div className="beat"><div className="bk"><BarChart3 size={13}/> Business impact</div><div className="bv">{decision.impact}</div></div>
          </div>
          <div className="grid grid-2 mt">
            {decision.options.map(o=>(
              <ChoiceCard key={o.id} opt={o} selected={picked===o.id} onSelect={()=>setPicked(o.id)}/>
            ))}
          </div>
          {pickedOpt?(
            <div className="tradeoff"><b>Trade-off:</b> {pickedOpt.tradeoff}<DeltaChips before={committed} after={preview}/></div>
          ):(
            <p style={{fontSize:"12.5px",color:"var(--text-muted)",marginTop:"12px"}}>Pick an option to see its trade-off and how each metric changes. You can switch options freely before continuing.</p>
          )}
        </div>
        <div className="card">
          <div className="sec-h"><Gauge/><span className="section-label">Live Business Metrics{pickedOpt?" - previewing your pick":""}</span></div>
          <MetricsPanel metrics={preview}/>
        </div>
      </div>
      <div className="mt-lg center">
        <button className="btn btn-primary btn-lg" disabled={!pickedOpt} onClick={()=>onNext(decision,pickedOpt)}>
          Lock In &amp; {index<4?"Next":"See Results"} <ArrowRight/>
        </button>
      </div>
    </div>
  );
}
function ScoreGauge({score}){
  const [disp,setDisp]=useState(0);
  const [arc,setArc]=useState(0);
  useEffect(()=>{
    let start=null;const dur=1100;
    function step(ts){if(!start)start=ts;const p=Math.min((ts-start)/dur,1);
      setDisp(Math.round(p*score));setArc(p*score*3.6);if(p<1)requestAnimationFrame(step);}
    const r=requestAnimationFrame(step);return()=>cancelAnimationFrame(r);
  },[score]);
  const band=gradeFor(score);
  return (
    <div className="gauge-wrap">
      <div className="gauge" style={{background:`conic-gradient(from -90deg, var(--accent) ${arc}deg, var(--track) ${arc}deg)`}}>
        <div className="gauge-inner">
          <div className="gauge-score">{disp}</div>
          <div className="gauge-of">out of 100</div>
        </div>
      </div>
      <div className="grade-badge"><Award size={14}/> {band.grade} · {band.label}</div>
    </div>
  );
}
function RadarChart({metrics,size=250}){
  const [p,setP]=useState(0);
  useEffect(()=>{
    let start=null;const dur=900;
    function step(ts){if(!start)start=ts;const t=Math.min((ts-start)/dur,1);setP(1-Math.pow(1-t,3));if(t<1)requestAnimationFrame(step);}
    const r=requestAnimationFrame(step);return()=>cancelAnimationFrame(r);
  },[metrics]);
  const cx=size/2, cy=size/2, R=size/2-42;
  const ang=i=>(-90+i*72)*Math.PI/180;
  const pt=(i,r)=>[cx+Math.cos(ang(i))*R*r, cy+Math.sin(ang(i))*R*r];
  const rings=[0.25,0.5,0.75,1];
  const dataPoly=METRIC_KEYS.map((k,i)=>pt(i,(goodness(k,metrics[k])/100)*p).join(",")).join(" ");
  return (
    <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`} style={{maxWidth:"100%"}}>
      {rings.map((r,ri)=>(
        <polygon key={ri} points={METRIC_KEYS.map((k,i)=>pt(i,r).join(",")).join(" ")}
          fill="none" stroke="var(--border-subtle)" strokeWidth="1"/>
      ))}
      {METRIC_KEYS.map((k,i)=>{const[x,y]=pt(i,1);return <line key={k} x1={cx} y1={cy} x2={x} y2={y} stroke="var(--border-subtle)" strokeWidth="1"/>;})}
      <polygon points={dataPoly} fill="rgba(255,102,51,0.16)" stroke="var(--accent)" strokeWidth="2" strokeLinejoin="round"/>
      {METRIC_KEYS.map((k,i)=>{const[x,y]=pt(i,(goodness(k,metrics[k])/100)*p);return <circle key={k} cx={x} cy={y} r="3.2" fill="var(--accent)"/>;})}
      {METRIC_KEYS.map((k,i)=>{const[x,y]=pt(i,1.16);
        return <text key={k} x={x} y={y} fontSize="10.5" fontWeight="700" fill="var(--text-secondary)"
          textAnchor={Math.abs(x-cx)<6?"middle":x>cx?"start":"end"} dominantBaseline="middle">{METRIC_SHORT[k]}</text>;})}
    </svg>
  );
}
function KpiCard({mkey,value}){
  const [w,setW]=useState(0);
  const g=goodness(mkey,value);
  useEffect(()=>{const t=requestAnimationFrame(()=>setW(g));return()=>cancelAnimationFrame(t);},[g]);
  const Ic=METRIC_ICON[mkey];
  const st=statusOf(mkey,value);
  return (
    <div className="kpi">
      <div className="kh"><Ic/> {METRIC_SHORT[mkey]}</div>
      <div className="kv">{Math.round(value)}</div>
      <div className={"ks "+st.toLowerCase()}>{st}{LOWER_BETTER[mkey]?" · lower better":""}</div>
      <div className="ktrack"><div className="kfill" style={{width:w+"%"}}/><div className="kbench" title="Industry average"/></div>
    </div>
  );
}
function FinalDashboard({metrics,company,choices,onReplay}){
  const rep=buildReport(metrics,choices);
  const band=gradeFor(rep.score);
  return (
    <div className="screen">
      <div className="card pad-lg">
        <div className="exec-hero">
          <div>
            <div className="eyebrow"><Target size={14}/> Executive Summary · {company.name}</div>
            <h2 className="title" style={{marginBottom:0}}>Supply Chain Scorecard</h2>
            <p className="summary">{rep.summary}</p>
            <div className="chips">
              <div className="chip"><span className="cic"><TrendingUp size={16}/></span><div><div className="ck">Top Strength</div><div className="cv">{METRIC_LABELS[rep.best]}</div></div></div>
              <div className="chip"><span className="cic"><TrendingDown size={16}/></span><div><div className="ck">Critical Weakness</div><div className="cv">{METRIC_LABELS[rep.worst]}</div></div></div>
              <div className="chip"><span className="cic"><Award size={16}/></span><div><div className="ck">Grade</div><div className="cv">{band.grade} · {band.label}</div></div></div>
            </div>
          </div>
          <ScoreGauge score={rep.score}/>
        </div>
      </div>

      <div className="dash-2 mt">
        <div className="card">
          <div className="sec-h"><BarChart3/><span className="section-label">Metric Breakdown</span></div>
          <div className="kpi-grid">{METRIC_KEYS.map(k=><KpiCard key={k} mkey={k} value={metrics[k]}/>)}</div>
        </div>
        <div className="card radar-card">
          <RadarChart metrics={metrics}/>
        </div>
      </div>

      <div className="card mt">
        <div className="sec-h"><ListChecks/><span className="section-label">Your 5 Decisions</span></div>
        <div className="recap">
          {rep.chosen.map((c,i)=>{const Ic=DEC_ICON[c.d.id];return(
            <div className="recap-chip" key={i}>
              <div className="ri"><Ic/></div>
              <div><div className="rk">{DEC_SHORT[c.d.id]}</div><div className="rv">{c.o.label}</div></div>
            </div>
          );})}
        </div>
      </div>

      <div className="grid grid-2 mt">
        <div className="card">
          <div className="sec-h"><TrendingUp/><span className="section-label">Strengths</span></div>
          {rep.strengths.map((s,i)=>{const Ic=s.icon;return <div className="sw-item good" key={i}><Ic size={15}/><span>{s.text}</span></div>;})}
        </div>
        <div className="card">
          <div className="sec-h"><TrendingDown/><span className="section-label">Weaknesses</span></div>
          {rep.weaknesses.map((s,i)=>{const Ic=s.icon;return <div className="sw-item bad" key={i}><Ic size={15}/><span>{s.text}</span></div>;})}
        </div>
      </div>

      <div className="card mt">
        <div className="sec-h"><AlertTriangle/><span className="section-label">Biggest Risk</span></div>
        <div className="risk-callout">
          <span className="ric"><AlertTriangle size={20}/></span>
          <div><div className="rt">{rep.risk.title}</div><div className="lead" style={{fontSize:"13.5px"}}>{rep.risk.body}</div></div>
        </div>
      </div>

      <div className="card mt">
        <div className="sec-h"><Lightbulb/><span className="section-label">Three Practical Improvements</span></div>
        <div className="grid grid-3">
          {rep.improvements.map((imp,i)=>{const Ic=imp.icon;return(
            <div className="imp-card" key={i}>
              <div className="imp-head"><div className="num">{i+1}</div><div className="it">{imp.title}</div></div>
              <div className="id">{imp.body}</div>
            </div>
          );})}
        </div>
      </div>

      <div className="mt-lg center">
        <button className="btn btn-primary btn-lg" onClick={onReplay}>
          <span className="rotating"><RotateCcw/></span> Play Again
        </button>
      </div>
    </div>
  );
}

/* ============ APP ============ */
function initialState(){
  const company=generateCompany();
  return {step:0, company, metrics:baseMetricsFor(company.demand), choices:[]};
}
function App(){
  const [state,setState]=useState(initialState);
  const {step,company,metrics,choices}=state;

  function start(){setState(s=>({...s,step:1}));}
  function reveal(){setState(s=>({...s,step:2}));}
  function commitAndNext(decision,opt){
    setState(s=>({...s,step:s.step+1,
      metrics:applyDelta(s.metrics,opt.delta,s.company.demand),
      choices:[...s.choices,{decision:decision.id,option:opt.id}]}));
  }
  function replay(){setState(initialState());}

  let body;
  if(step===0) body=<WelcomeScreen onStart={start}/>;
  else if(step===1) body=<CompanyRevealScreen company={company} onNext={reveal}/>;
  else if(step>=2&&step<=6){
    const idx=step-2;
    body=<DecisionScreen key={idx} index={idx} decision={DECISIONS[idx]} committed={metrics}
            demand={company.demand} onNext={commitAndNext}/>;
  } else {
    body=<FinalDashboard metrics={metrics} company={company} choices={choices} onReplay={replay}/>;
  }

  return (
    <div>
      <div className="app-head">
        <div className="logo-dot"><Workflow size={17}/></div>
        <h1>Supply Chain Builder</h1>
        <div className="sub">Make 5 decisions. Watch the trade-offs. Score your chain.</div>
      </div>
      {body}
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
