<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Operation Lifeline: Supply Chain Crisis Lab — v2 (2026-06-30)</title>
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;600&display=swap');

  *{margin:0;padding:0;box-sizing:border-box;}
  /* Tokens aligned to branding-style.md - Light (default) theme.
     Brand accent = EXL orange #FF6633. Updated: June 30, 2026. */
  :root{
    --bg:#F7F8FA;
    --bg2:#FFFFFF;
    --bg3:#F0F2F6;
    --card:#FFFFFF;
    --card2:#FBFAF8;
    --border:#E7E9EE;
    --orange:#FF6633;
    --orange2:#FF7d52;
    --orange3:#FFAD33;
    --orange-dim:#FF663322;
    --orange-glow:0 0 30px rgba(255,102,51,0.20);
    --text:#0B1B33;
    --text2:#5A6577;
    --text3:#9AA3B2;
    --green:#16A34A;
    --red:#DC2626;
    --blue:#2563EB;
    --yellow:#D97706;
    --purple:#7C3AED;
    --radius:16px;
    --radius-sm:10px;
    --shadow:0 8px 32px rgba(11,27,51,0.10);
    --shadow-card:0 1px 2px rgba(11,27,51,.05), 0 8px 24px rgba(11,27,51,.06);
  }
  html,body{height:100%;font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);overflow-x:hidden;}
  #root{min-height:100vh;}

  /* branding-style.md §8 — shared states */
  ::selection{background:var(--orange-dim);}
  :focus-visible{outline:2px solid var(--orange);outline-offset:2px;border-radius:6px;}
  @media (prefers-reduced-motion: reduce){*{animation:none!important;transition:none!important;}}

  /* Scrollbar */
  ::-webkit-scrollbar{width:6px;}
  ::-webkit-scrollbar-track{background:var(--bg2);}
  ::-webkit-scrollbar-thumb{background:var(--orange);border-radius:3px;}

  /* Animations */
  @keyframes fadeIn{from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:translateY(0);}}
  @keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.6;}}
  @keyframes glow{0%,100%{box-shadow:0 0 10px #FF663333;}50%{box-shadow:0 0 30px #FF663366,0 0 60px #FF663322;}}
  @keyframes fillBar{from{width:0%;}to{width:var(--target);}}
  @keyframes spin{from{transform:rotate(0deg);}to{transform:rotate(360deg);}}
  @keyframes shake{0%,100%{transform:translateX(0);}25%{transform:translateX(-4px);}75%{transform:translateX(4px);}}
  @keyframes slideIn{from{opacity:0;transform:translateX(-20px);}to{opacity:1;transform:translateX(0);}}
  @keyframes countUp{from{opacity:0;transform:scale(0.8);}to{opacity:1;transform:scale(1);}}
  @keyframes borderPulse{0%,100%{border-color:var(--orange);}50%{border-color:var(--orange3);}}
  @keyframes float{0%,100%{transform:translateY(0);}50%{transform:translateY(-6px);}}
  @keyframes scanline{0%{transform:translateY(-100%);}100%{transform:translateY(100vh);}}
  @keyframes bgMove{0%{background-position:0% 50%;}50%{background-position:100% 50%;}100%{background-position:0% 50%;}}

  .fade-in{animation:fadeIn 0.5s ease forwards;}
  .slide-in{animation:slideIn 0.4s ease forwards;}
  .glow-pulse{animation:glow 2s ease-in-out infinite;}
  .float{animation:float 3s ease-in-out infinite;}

  /* Layout */
  .app{min-height:100vh;background:var(--bg);position:relative;overflow:hidden;}
  .app::before{content:'';position:fixed;top:0;left:0;right:0;bottom:0;background:radial-gradient(ellipse at 20% 20%,#FF663308 0%,transparent 50%),radial-gradient(ellipse at 80% 80%,#FF7d5205 0%,transparent 50%);pointer-events:none;z-index:0;}

  .screen{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;position:relative;z-index:1;}
  .screen-content{width:100%;max-width:1100px;animation:fadeIn 0.6s ease;}

  /* Buttons */
  .btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:14px 28px;border-radius:var(--radius-sm);font-family:'Inter',sans-serif;font-size:15px;font-weight:600;cursor:pointer;transition:all 0.25s ease;border:none;text-decoration:none;position:relative;overflow:hidden;}
  .btn::after{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,0.08),transparent);pointer-events:none;}
  .btn-primary{background:linear-gradient(135deg,var(--orange),var(--orange2));color:#fff;box-shadow:0 4px 20px rgba(255,102,51,0.4);}
  .btn-primary:hover{transform:translateY(-2px);box-shadow:0 8px 30px rgba(255,102,51,0.6);}
  .btn-primary:active{transform:translateY(0);}
  .btn-secondary{background:transparent;color:var(--orange);border:1.5px solid var(--orange);box-shadow:inset 0 0 0 0 var(--orange);}
  .btn-secondary:hover{background:var(--orange-dim);box-shadow:var(--orange-glow);}
  .btn-ghost{background:var(--bg3);color:var(--text2);border:1px solid var(--border);}
  .btn-ghost:hover{background:var(--card2);color:var(--text);border-color:var(--text3);}
  .btn-danger{background:linear-gradient(135deg,#c0392b,#e74c3c);color:#fff;}
  .btn-danger:hover{transform:translateY(-2px);box-shadow:0 8px 20px rgba(231,76,60,0.4);}
  .btn-green{background:linear-gradient(135deg,#00a876,var(--green));color:#fff;box-shadow:0 4px 16px rgba(0,200,150,0.3);}
  .btn-green:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,200,150,0.5);}
  .btn-lg{padding:18px 40px;font-size:17px;}
  .btn-sm{padding:8px 16px;font-size:13px;}
  .btn:disabled{opacity:0.4;cursor:not-allowed;transform:none!important;}

  /* Cards */
  .card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:24px;box-shadow:var(--shadow-card);}
  .card-hover{transition:all 0.25s ease;}
  .card-hover:hover{border-color:var(--orange);box-shadow:var(--orange-glow),var(--shadow-card);transform:translateY(-2px);}
  .card-selected{border-color:var(--orange)!important;background:var(--orange-dim)!important;box-shadow:var(--orange-glow)!important;}
  .card-header{display:flex;align-items:center;gap:12px;margin-bottom:16px;}
  .card-icon{width:44px;height:44px;border-radius:10px;background:var(--orange-dim);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;}
  .card-title{font-size:16px;font-weight:700;color:var(--text);}
  .card-subtitle{font-size:13px;color:var(--text3);margin-top:2px;}

  /* Header */
  .page-header{text-align:center;margin-bottom:36px;}
  .step-badge{display:inline-flex;align-items:center;gap:6px;background:var(--orange-dim);border:1px solid var(--orange);border-radius:20px;padding:6px 14px;font-size:12px;font-weight:600;color:var(--orange);letter-spacing:0.5px;margin-bottom:12px;}
  .page-title{font-size:32px;font-weight:800;color:var(--text);line-height:1.2;}
  .page-title span{color:var(--orange);}
  .page-subtitle{font-size:16px;color:var(--text2);margin-top:8px;line-height:1.6;max-width:600px;margin-left:auto;margin-right:auto;}

  /* Progress bars */
  .progress-container{margin:8px 0;}
  .progress-label{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;}
  .progress-label-text{font-size:13px;font-weight:500;color:var(--text2);}
  .progress-label-value{font-size:13px;font-weight:700;font-family:'JetBrains Mono',monospace;}
  .progress-track{height:8px;background:var(--bg3);border-radius:4px;overflow:hidden;position:relative;}
  .progress-fill{height:100%;border-radius:4px;transition:width 1.2s cubic-bezier(0.4,0,0.2,1);position:relative;}
  .progress-fill::after{content:'';position:absolute;top:0;left:0;right:0;bottom:0;background:linear-gradient(90deg,transparent,rgba(255,255,255,0.2),transparent);animation:shimmer 2s infinite;}
  @keyframes shimmer{0%{transform:translateX(-100%);}100%{transform:translateX(100%);}}
  .progress-orange .progress-fill{background:linear-gradient(90deg,var(--orange),var(--orange3));}
  .progress-green .progress-fill{background:linear-gradient(90deg,#00a876,var(--green));}
  .progress-red .progress-fill{background:linear-gradient(90deg,#c0392b,var(--red));}
  .progress-blue .progress-fill{background:linear-gradient(90deg,#2980b9,var(--blue));}
  .progress-yellow .progress-fill{background:linear-gradient(90deg,#f39c12,var(--yellow));}
  .progress-purple .progress-fill{background:linear-gradient(90deg,#8e44ad,var(--purple));}

  /* Grids */
  .grid-2{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:20px;}
  .grid-3{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:16px;}
  .grid-4{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:16px;}

  /* Tags */
  .tag{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:6px;font-size:11px;font-weight:600;letter-spacing:0.3px;}
  .tag-orange{background:var(--orange-dim);color:var(--orange);border:1px solid #FF663333;}
  .tag-red{background:#ff3d3d15;color:var(--red);border:1px solid #ff3d3d33;}
  .tag-green{background:#00c89615;color:var(--green);border:1px solid #00c89633;}
  .tag-blue{background:#4d9fff15;color:var(--blue);border:1px solid #4d9fff33;}
  .tag-yellow{background:#ffd70015;color:var(--yellow);border:1px solid #ffd70033;}
  .tag-purple{background:#b066ff15;color:var(--purple);border:1px solid #b066ff33;}

  /* Divider */
  .divider{height:1px;background:linear-gradient(90deg,transparent,var(--border),transparent);margin:24px 0;}

  /* Metric box */
  .metric-box{background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-sm);padding:16px;text-align:center;}
  .metric-value{font-size:26px;font-weight:800;font-family:'JetBrains Mono',monospace;color:var(--orange);}
  .metric-label{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:1px;margin-top:4px;}
  .metric-change{font-size:12px;margin-top:4px;}
  .metric-up{color:var(--green);}
  .metric-down{color:var(--red);}

  /* Crisis badge */
  .crisis-urgency{display:flex;align-items:center;gap:8px;padding:12px 16px;border-radius:var(--radius-sm);margin-top:12px;}
  .crisis-critical{background:#ff3d3d15;border:1px solid #ff3d3d44;}
  .crisis-high{background:#FF663315;border:1px solid #FF663344;}
  .crisis-medium{background:#ffd70015;border:1px solid #ffd70044;}
  .urgency-dot{width:8px;height:8px;border-radius:50%;animation:pulse 1.5s ease infinite;}

  /* Negotiation */
  .neg-round{background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-sm);padding:16px;margin-bottom:12px;}
  .neg-choice{padding:12px 16px;border:1.5px solid var(--border);border-radius:var(--radius-sm);cursor:pointer;transition:all 0.2s ease;margin-top:8px;font-size:14px;color:var(--text2);}
  .neg-choice:hover{border-color:var(--orange);color:var(--text);background:var(--orange-dim);}
  .neg-choice.selected{border-color:var(--orange);background:var(--orange-dim);color:var(--orange);}

  /* Score ring */
  .score-ring{position:relative;width:140px;height:140px;margin:0 auto 20px;}
  .score-ring svg{transform:rotate(-90deg);}
  .score-ring .score-text{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
  .score-number{font-size:36px;font-weight:900;font-family:'JetBrains Mono',monospace;color:var(--orange);}
  .score-max{font-size:13px;color:var(--text3);}

  /* Welcome screen specifics */
  .welcome-logo{font-size:48px;margin-bottom:16px;animation:float 3s ease-in-out infinite;}
  .welcome-title{font-size:52px;font-weight:900;background:linear-gradient(135deg,var(--orange),var(--orange2),var(--text));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1.1;margin-bottom:8px;}
  .welcome-sub{font-size:20px;color:var(--text2);margin-bottom:8px;}
  .welcome-tagline{font-size:14px;color:var(--text3);margin-bottom:40px;letter-spacing:0.5px;}
  .feature-pill{display:inline-flex;align-items:center;gap:6px;background:var(--bg3);border:1px solid var(--border);border-radius:20px;padding:8px 16px;font-size:13px;color:var(--text2);margin:4px;}
  .feature-pills{display:flex;flex-wrap:wrap;justify-content:center;gap:4px;margin-bottom:36px;}

  /* Action cards */
  .action-card{background:var(--card);border:1.5px solid var(--border);border-radius:var(--radius);padding:20px;cursor:pointer;transition:all 0.25s ease;position:relative;overflow:hidden;}
  .action-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--orange),var(--orange3));transform:scaleX(0);transition:transform 0.3s ease;}
  .action-card:hover::before{transform:scaleX(1);}
  .action-card:hover{border-color:var(--orange);box-shadow:var(--orange-glow);}
  .action-card.selected{border-color:var(--orange);background:var(--orange-dim);}
  .action-card.selected::before{transform:scaleX(1);}
  .action-card.disabled{opacity:0.4;cursor:not-allowed;}
  .action-card.disabled:hover{transform:none;border-color:var(--border);}
  .action-number{position:absolute;top:12px;right:12px;width:24px;height:24px;border-radius:50%;background:var(--orange);color:#fff;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;}

  /* CEO questions */
  .ceo-option{padding:14px 18px;border:1.5px solid var(--border);border-radius:var(--radius-sm);cursor:pointer;transition:all 0.2s;font-size:14px;color:var(--text2);line-height:1.5;margin-top:10px;}
  .ceo-option:hover{border-color:var(--orange);color:var(--text);background:var(--orange-dim);}
  .ceo-option.correct{border-color:var(--green);background:#00c89615;color:var(--green);}
  .ceo-option.wrong{border-color:var(--red);background:#ff3d3d15;color:var(--red);animation:shake 0.4s ease;}

  /* AI cards */
  .ai-card{background:var(--card);border:1.5px solid var(--border);border-radius:var(--radius);padding:22px;cursor:pointer;transition:all 0.25s ease;}
  .ai-card:hover{border-color:var(--purple);box-shadow:0 0 20px #b066ff33;}
  .ai-card.selected{border-color:var(--purple);background:#b066ff10;}

  /* Final dashboard */
  .score-card{background:linear-gradient(135deg,var(--card),var(--bg3));border:1px solid var(--border);border-radius:var(--radius);padding:20px;text-align:center;}
  .final-metric{font-size:28px;font-weight:800;font-family:'JetBrains Mono',monospace;}
  .feedback-box{background:var(--bg3);border-left:4px solid var(--orange);padding:16px 20px;border-radius:0 var(--radius-sm) var(--radius-sm) 0;margin:8px 0;font-size:14px;color:var(--text2);line-height:1.6;}
  .feedback-highlight{color:var(--orange);font-weight:600;}

  /* Nav dots */
  .nav-dots{display:flex;gap:6px;justify-content:center;margin-bottom:24px;}
  .nav-dot{width:8px;height:8px;border-radius:50%;background:var(--border);transition:all 0.3s ease;}
  .nav-dot.active{background:var(--orange);width:24px;border-radius:4px;}
  .nav-dot.done{background:var(--orange);opacity:0.5;}

  /* Tooltip */
  .tooltip-box{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:12px 16px;font-size:13px;color:var(--text2);line-height:1.6;margin-top:8px;}
  .tooltip-box strong{color:var(--orange);}

  /* Context box */
  .context-box{background:linear-gradient(135deg,var(--bg3),var(--card));border:1px solid var(--border);border-left:3px solid var(--orange);border-radius:var(--radius-sm);padding:16px 20px;margin-bottom:24px;}
  .context-title{font-size:11px;font-weight:700;color:var(--orange);letter-spacing:1px;text-transform:uppercase;margin-bottom:6px;}
  .context-text{font-size:14px;color:var(--text2);line-height:1.6;}

  /* Responsive */
  @media(max-width:768px){
    .welcome-title{font-size:34px;}
    .grid-2,.grid-3,.grid-4{grid-template-columns:1fr;}
    .page-title{font-size:24px;}
    .screen{padding:16px;}
  }
  @media(max-width:480px){
    .welcome-title{font-size:26px;}
    .btn-lg{padding:14px 24px;font-size:15px;}
  }

  /* Separator line with text */
  .sep{display:flex;align-items:center;gap:12px;margin:20px 0;}
  .sep::before,.sep::after{content:'';flex:1;height:1px;background:var(--border);}
  .sep span{font-size:12px;color:var(--text3);white-space:nowrap;}

  /* Info rows */
  .info-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--border);}
  .info-row:last-child{border-bottom:none;}
  .info-key{font-size:13px;color:var(--text3);}
  .info-val{font-size:13px;font-weight:600;color:var(--text);}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useRef,useCallback}=React;

// ─── DATA ────────────────────────────────────────────────────────────────────
const INDUSTRIES=[
  {name:'Automotive',icon:'🚗',products:'Vehicles & Parts'},
  {name:'Pharmaceutical',icon:'💊',products:'Medicines & Vaccines'},
  {name:'Consumer Electronics',icon:'📱',products:'Smartphones & Laptops'},
  {name:'Aerospace',icon:'✈️',products:'Aircraft Components'},
  {name:'Food & Beverage',icon:'🍔',products:'Packaged Foods'},
  {name:'Fashion & Apparel',icon:'👗',products:'Clothing & Accessories'},
  {name:'Industrial Machinery',icon:'⚙️',products:'Heavy Equipment'},
  {name:'Chemical',icon:'🧪',products:'Specialty Chemicals'},
];
const COMPANY_NAMES=['NexGen','ArcaFlow','VertexOps','TitanEdge','OptiCore','StellarBridge','CentraLink','ZephyrLogix'];
const COUNTRIES=['USA','China','Germany','India','Brazil','Vietnam','Mexico','South Korea','Turkey','Poland'];
const CRISES=[
  {id:'fire',name:'Factory Fire',icon:'🔥',color:'#ff3d3d',urgency:'CRITICAL',desc:'A major manufacturing facility has been destroyed by fire. 40% of production capacity is offline. Smoke damage has contaminated nearby inventory.',impact:'Production halted for 3-6 months. Insurance claims pending. Regulators on-site.',why:'Factory fires cause immediate production stops and ripple across the entire supply network. Every hour of downtime costs money and erodes customer trust.'},
  {id:'bankrupt',name:'Supplier Bankruptcy',icon:'💸',color:'#FF6633',urgency:'CRITICAL',desc:'Your largest tier-1 supplier has filed for bankruptcy overnight. They supply 60% of your critical raw materials. Contracts are frozen.',impact:'$180M in prepaid orders at risk. 12 weeks of raw material shortage projected.',why:'Single-source suppliers are a hidden vulnerability. Their bankruptcy instantly becomes your crisis — you inherit their problem.'},
  {id:'strike',name:'Port Strike',icon:'⚓',color:'#FF7d52',urgency:'HIGH',desc:'Dock workers at 3 major Pacific ports have gone on indefinite strike. 70% of your import/export routes are affected. Containers piling up.',impact:'Shipping delays of 6-10 weeks. Container costs up 400%. Perishables at risk.',why:'Port strikes demonstrate how geopolitical labor relations can freeze global trade. Your goods sit in containers while customer orders go unfilled.'},
  {id:'cyber',name:'Cyberattack',icon:'💻',color:'#b066ff',urgency:'CRITICAL',desc:'Ransomware has encrypted your ERP, WMS, and TMS systems. All inventory visibility is lost. Hackers demand $12M ransom.',impact:'Zero visibility into stock levels. Orders cannot be processed. Data breach risk.',why:'Modern supply chains run on data. When systems go dark, you\'re flying blind — unable to fulfill orders or even know what inventory you have.'},
  {id:'flood',name:'Catastrophic Flood',icon:'🌊',color:'#4d9fff',urgency:'HIGH',desc:'Unprecedented flooding in Southeast Asia has submerged 3 of your key warehouses and disrupted road transport networks for 200km.',impact:'$95M in inventory lost. 8 distribution centers inaccessible. Recovery timeline unknown.',why:'Climate events expose geographic concentration risk. When nature strikes, physical assets become liabilities.'},
  {id:'material',name:'Raw Material Shortage',icon:'🪨',color:'#ffd700',urgency:'HIGH',desc:'A critical rare earth mineral used in 80% of your products has seen global supply drop 70% due to new export restrictions from the source nation.',impact:'Production costs up 250%. Competitors hoarding. Alternative sourcing takes 18 months.',why:'Material dependencies can be invisible until they become crises. Geopolitical export controls can strangle your production overnight.'},
  {id:'conflict',name:'Political Conflict',icon:'🚨',color:'#FF6633',urgency:'HIGH',desc:'Armed conflict has broken out in a region hosting 2 of your largest manufacturing hubs. Government has suspended commercial operations.',impact:'2,400 employees evacuated. Assets at risk. International community imposing sanctions.',why:'Political instability transforms business assets into liabilities. When governments collapse, supply chains collapse with them.'},
  {id:'delay',name:'Global Shipping Delay',icon:'🚢',color:'#00c896',urgency:'MEDIUM',desc:'A combination of vessel groundings, congestion, and new customs regulations has added 8-14 weeks to all ocean freight shipments.',impact:'On-time delivery rate at 23%. Expedited air freight costs up 700%. Customers cancelling.',why:'Ocean freight carries 90% of global trade. When it slows, every industry feels the pain. Speed-to-market becomes impossible.'},
];
const ACTIONS=[
  {id:'air',name:'Emergency Air Freight',icon:'✈️',cost:-35,inventory:+20,profit:-25,speed:+35,satisfaction:+20,desc:'Charter aircraft to bypass blocked sea/land routes and rush critical inventory to customers.',why:'Air freight is 6x faster than sea freight but costs 10x more. Use when customer relationships outweigh short-term cost.'},
  {id:'alt_supplier',name:'Activate Backup Suppliers',icon:'🏭',cost:-15,inventory:+30,profit:-10,speed:+15,satisfaction:+15,desc:'Qualify and onboard pre-vetted alternative suppliers to replace the disrupted primary source.',why:'Having qualified backup suppliers is supply chain insurance. Activation takes time, but pays dividends during crises.'},
  {id:'ration',name:'Ration & Prioritize Inventory',icon:'📊',cost:+5,inventory:-10,profit:-5,speed:-10,satisfaction:-5,desc:'Allocate limited stock to highest-value customers first. Pause low-margin orders temporarily.',why:'Triage is painful but necessary. Protecting top customers during scarcity preserves long-term revenue even at short-term cost.'},

// ─── PROGRESS BAR ────────────────────────────────────────────────────────────
function ProgressBar({label,value,color='orange',showValue=true,animate=false}){
  const [width,setWidth]=useState(animate?0:value);
  useEffect(()=>{if(animate){const t=setTimeout(()=>setWidth(value),100);return()=>clearTimeout(t);}},[value,animate]);
  const colorVal=value>66?'green':value>40?'orange':'red';
  const useColor=color==='auto'?colorVal:color;
  return(
    <div className="progress-container">
      <div className="progress-label">
        <span className="progress-label-text">{label}</span>
        {showValue&&<span className="progress-label-value" style={{color:`var(--${useColor})`}}>{Math.round(value)}%</span>}
      </div>
      <div className="progress-track">
        <div className={`progress-fill progress-${useColor}-fill`} style={{width:`${width}%`,background:useColor==='orange'?'linear-gradient(90deg,var(--orange),var(--orange3))':useColor==='green'?'linear-gradient(90deg,#00a876,var(--green))':useColor==='red'?'linear-gradient(90deg,#c0392b,var(--red))':useColor==='blue'?'linear-gradient(90deg,#2980b9,var(--blue))':useColor==='yellow'?'linear-gradient(90deg,#f39c12,var(--yellow))':'linear-gradient(90deg,#8e44ad,var(--purple))',transition:'width 1.2s cubic-bezier(0.4,0,0.2,1)'}}/>
      </div>
    </div>
  );
}

// ─── SCORE RING ──────────────────────────────────────────────────────────────
function ScoreRing({score,size=140}){
  const r=54;const c=2*Math.PI*r;const pct=score/100;const dash=pct*c;
  const color=score>=70?'#00c896':score>=50?'#FF6633':'#ff3d3d';
  return(
    <div className="score-ring" style={{width:size,height:size}}>
      <svg width={size} height={size} viewBox="0 0 120 120" style={{transform:'rotate(-90deg)'}}>
        <circle cx="60" cy="60" r={r} fill="none" stroke="#222" strokeWidth="8"/>
        <circle cx="60" cy="60" r={r} fill="none" stroke={color} strokeWidth="8"
          strokeDasharray={`${dash} ${c}`} strokeLinecap="round"
          style={{transition:'stroke-dasharray 1.5s cubic-bezier(0.4,0,0.2,1)'}}/>
      </svg>
      <div className="score-text">
        <div className="score-number" style={{color}}>{score}</div>
        <div className="score-max">/100</div>
      </div>
    </div>
  );
}

// ─── SCREEN 5: NEGOTIATION ───────────────────────────────────────────────────
function NegotiationScreen({onComplete}){
  const [round,setRound]=useState(0);
  const [chosen,setChosen]=useState([]);
  const [trust,setTrust]=useState(50);
  const [price,setPrice]=useState(50);
  const [lead,setLead]=useState(50);
  const [selected,setSelected]=useState(null);
  const [revealed,setRevealed]=useState(false);

  const current=NEG_ROUNDS[round];
  function choose(idx){
    if(revealed)return;
    setSelected(idx);
    const c=current.choices[idx];
    setTrust(v=>clamp(v+c.trust,0,100));
    setPrice(v=>clamp(v+c.price,0,100));
    setLead(v=>clamp(v+c.lead,0,100));
    setChosen(prev=>[...prev,idx]);
    setRevealed(true);
  }
  function next(){
    if(round<NEG_ROUNDS.length-1){
      setRound(r=>r+1);
      setSelected(null);
      setRevealed(false);
    } else {
      const score=Math.round((trust*0.4+price*0.3+lead*0.3));
      onComplete({trust,price,lead,score,choices:chosen});
    }
  }
  const c=current.choices[selected];
  return(
    <div className="screen">
      <div className="screen-content">
        <NavDots step={4}/>
        <div className="page-header">
          <div className="step-badge">🤝 STEP 3 OF 7 · SUPPLIER NEGOTIATION</div>
          <div className="page-title">Round {round+1} of <span>{NEG_ROUNDS.length}</span></div>
          <div className="page-subtitle">Negotiate with your backup supplier. Every choice affects trust, price, and lead time. Choose wisely — relationships outlast crises.</div>
        </div>
        <div className="grid-3" style={{marginBottom:24}}>
          <div className="metric-box">
            <div className="metric-value" style={{color:trust>60?'var(--green)':trust>40?'var(--orange)':'var(--red)'}}>{trust}</div>
            <div className="metric-label">Trust Score</div>
          </div>
          <div className="metric-box">
            <div className="metric-value" style={{color:price>60?'var(--green)':price>40?'var(--orange)':'var(--red)'}}>{price}</div>
            <div className="metric-label">Price Position</div>
          </div>
          <div className="metric-box">
            <div className="metric-value" style={{color:lead>60?'var(--green)':lead>40?'var(--orange)':'var(--red)'}}>{lead}</div>
            <div className="metric-label">Lead Time</div>
          </div>
        </div>
        <div className="card" style={{marginBottom:20}}>
          <div style={{fontSize:12,fontWeight:700,color:'var(--orange)',letterSpacing:1,textTransform:'uppercase',marginBottom:8}}>Current Situation</div>
          <div style={{fontSize:15,color:'var(--text)',lineHeight:1.7}}>{current.situation}</div>
        </div>
        <div style={{marginBottom:20}}>
          {current.choices.map((ch,i)=>(
            <div key={i} className={`neg-choice ${selected===i?'selected':''} ${revealed&&selected!==i?'disabled':''}`}
              style={{opacity:revealed&&selected!==i?0.4:1}}
              onClick={()=>choose(i)}>
              <div style={{display:'flex',gap:10,alignItems:'flex-start'}}>
                <span style={{color:'var(--orange)',fontWeight:700,flexShrink:0}}>{String.fromCharCode(65+i)}.</span>
                <span>{ch.text}</span>
              </div>
            </div>
          ))}
        </div>
        {revealed&&c&&(
          <div className="card fade-in" style={{marginBottom:20,borderColor:'var(--orange)',background:'var(--orange-dim)'}}>
            <div style={{fontSize:12,fontWeight:700,color:'var(--orange)',letterSpacing:1,marginBottom:8}}>OUTCOME</div>
            <div style={{fontSize:14,color:'var(--text)',lineHeight:1.6,marginBottom:12}}>{c.result}</div>
            <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
              {c.trust!==0&&<span className={`tag ${c.trust>0?'tag-green':'tag-red'}`}>Trust {c.trust>0?'+':''}{c.trust}</span>}
              {c.price!==0&&<span className={`tag ${c.price>0?'tag-green':'tag-red'}`}>Price {c.price>0?'+':''}{c.price}</span>}
              {c.lead!==0&&<span className={`tag ${c.lead>0?'tag-green':'tag-red'}`}>Lead Time {c.lead>0?'+':''}{c.lead}</span>}
            </div>
          </div>
        )}
        {revealed&&(
          <div style={{textAlign:'center'}}>
            <button className="btn btn-primary btn-lg" onClick={next}>
              {round<NEG_ROUNDS.length-1?`Round ${round+2} →`:'Enter CEO Boardroom →'}
            </button>
          </div>
        )}
      </div>
    </div>
  );
}

// ─── SCREEN 6: CEO BOARDROOM ─────────────────────────────────────────────────
function CEOScreen({onComplete}){
  const [q,setQ]=useState(0);
  const [score,setScore]=useState(0);
  const [selected,setSelected]=useState(null);
  const [revealed,setRevealed]=useState(false);

  const current=CEO_QUESTIONS[q];
  function choose(i){
    if(revealed)return;
    setSelected(i);
    setRevealed(true);
    if(current.options[i].correct)setScore(s=>s+20);
  }
  function next(){
    if(q<CEO_QUESTIONS.length-1){
      setQ(n=>n+1);
      setSelected(null);
      setRevealed(false);
    } else {
      onComplete(score+(current.options[selected]?.correct?20:0)>score?score+(current.options[selected].correct?0:0):score);
    }
  }
  // fix: compute final score on last question
  function handleNext(){
    const finalScore=score+(revealed&&current.options[selected]?.correct&&q===CEO_QUESTIONS.length-1?20:0);
    if(q<CEO_QUESTIONS.length-1){
      setQ(n=>n+1);
      setSelected(null);
      setRevealed(false);
    } else {
      onComplete(finalScore);
    }
  }
  const chosenOpt=selected!==null?current.options[selected]:null;
  return(
    <div className="screen">
      <div className="screen-content">
        <NavDots step={5}/>
        <div className="page-header">
          <div className="step-badge">👔 STEP 4 OF 7 · CEO BOARDROOM</div>
          <div className="page-title">Executive <span>Decision Test</span></div>
          <div className="page-subtitle">Answer 5 leadership questions. These are real-world supply chain dilemmas that separate world-class executives from average ones.</div>
        </div>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:20}}>
          <div style={{fontSize:13,color:'var(--text3)'}}>Question {q+1} of {CEO_QUESTIONS.length}</div>
          <div style={{fontSize:13,fontWeight:600,color:'var(--orange)'}}>Score: {score}/100</div>
        </div>
        <div style={{height:3,background:'var(--bg3)',borderRadius:2,marginBottom:24}}>
          <div style={{height:'100%',background:'linear-gradient(90deg,var(--orange),var(--orange3))',borderRadius:2,width:`${((q)/CEO_QUESTIONS.length)*100}%`,transition:'width 0.5s ease'}}/>
        </div>
        <div className="card" style={{marginBottom:8}}>
          <div style={{fontSize:12,fontWeight:700,color:'var(--orange)',letterSpacing:1,textTransform:'uppercase',marginBottom:10}}>Boardroom Scenario</div>
          <div style={{fontSize:16,fontWeight:600,color:'var(--text)',lineHeight:1.6,marginBottom:12}}>{current.q}</div>
          <div style={{fontSize:13,color:'var(--text3)',lineHeight:1.6,fontStyle:'italic'}}>{current.context}</div>
        </div>
        <div style={{marginBottom:16}}>
          {current.options.map((o,i)=>(
            <div key={i}
              className={`ceo-option ${revealed?o.correct?'correct':selected===i?'wrong':'':''}`}
              onClick={()=>choose(i)}>
              <div style={{display:'flex',gap:10}}>
                <span style={{fontWeight:700,flexShrink:0,color:revealed?o.correct?'var(--green)':selected===i?'var(--red)':'var(--text3)':'var(--orange)'}}>{String.fromCharCode(65+i)}.</span>
                <span>{o.text}</span>
              </div>
            </div>
          ))}
        </div>
        {revealed&&chosenOpt&&(
          <div className={`card fade-in`} style={{marginBottom:16,borderColor:chosenOpt.correct?'var(--green)':'var(--red)',background:chosenOpt.correct?'#00c89610':'#ff3d3d10'}}>
            <div style={{fontSize:12,fontWeight:700,letterSpacing:1,color:chosenOpt.correct?'var(--green)':'var(--red)',marginBottom:6}}>
              {chosenOpt.correct?'✓ CORRECT — Expert Thinking':'✗ INCORRECT — Common Trap'}
            </div>
            <div style={{fontSize:14,color:'var(--text2)',lineHeight:1.6}}>{current.options.find(o=>o.correct).exp}</div>
          </div>
        )}
        {revealed&&(
          <div style={{textAlign:'center'}}>
            <button className="btn btn-primary btn-lg" onClick={handleNext}>
              {q<CEO_QUESTIONS.length-1?`Question ${q+2} →`:'AI Strategy Session →'}
            </button>
          </div>
        )}
      </div>
    </div>
  );
}

      return [...prev,id];

              <div style={{fontSize:42,fontWeight:900,color:gradeColor,fontFamily:'JetBrains Mono'}}>{overall}/100</div>
              <div style={{fontSize:20,fontWeight:700,color:'var(--text)',marginTop:4}}>{gradeText}</div>
              <div style={{marginTop:8,display:'flex',gap:8,flexWrap:'wrap'}}>
                <span className="tag" style={{background:`${gradeColor}20`,color:gradeColor,border:`1px solid ${gradeColor}44`,fontSize:14,padding:'5px 14px'}}>Grade: {grade}</span>
                <span className="tag tag-orange">{crisis.name}</span>
                <span className="tag tag-blue">{company.industry}</span>
              </div>
            </div>
          </div>
        </div>

        {/* Metrics grid */}
        <div className="grid-3" style={{marginBottom:24}}>
          {[
            {label:'Leadership',value:leadership,color:'orange'},
            {label:'Negotiation',value:negotiation,color:'blue'},
            {label:'Resilience',value:resilience,color:'green'},
            {label:'Cost Control',value:costControl,color:'yellow'},
            {label:'Risk Management',value:riskMgmt,color:'purple'},
            {label:'Customer Satisfaction',value:custSat,color:'auto'},
          ].map(m=>(
            <div key={m.label} className="score-card fade-in">
              <div className="final-metric" style={{color:m.value>=70?'var(--green)':m.value>=50?'var(--orange)':'var(--red)'}}>{Math.round(m.value)}</div>
              <div style={{fontSize:11,color:'var(--text3)',textTransform:'uppercase',letterSpacing:1,marginTop:4}}>{m.label}</div>
              <ProgressBar label="" value={Math.round(m.value)} color={m.value>=70?'green':m.value>=50?'orange':'red'} showValue={false} animate/>
            </div>
          ))}
        </div>

        <div className="grid-2" style={{marginBottom:24}}>
          {/* Detailed metrics */}
          <div className="card">
            <div style={{fontSize:12,fontWeight:700,color:'var(--orange)',letterSpacing:1,textTransform:'uppercase',marginBottom:16}}>Operational Metrics</div>
            <ProgressBar label="Cost Efficiency" value={metrics.cost} color="auto" animate/>
            <ProgressBar label="Inventory Health" value={metrics.inventory} color="auto" animate/>
            <ProgressBar label="Profit Margin" value={metrics.profit} color="auto" animate/>
            <ProgressBar label="Delivery Speed" value={metrics.speed} color="auto" animate/>
            <ProgressBar label="Customer Satisfaction" value={metrics.satisfaction} color="auto" animate/>
          </div>

          {/* Negotiation breakdown */}
          <div className="card">
            <div style={{fontSize:12,fontWeight:700,color:'var(--blue)',letterSpacing:1,textTransform:'uppercase',marginBottom:16}}>Negotiation Breakdown</div>
            <ProgressBar label="Supplier Trust" value={negResult.trust} color="green" animate/>
            <ProgressBar label="Price Position" value={negResult.price} color="orange" animate/>
            <ProgressBar label="Lead Time Score" value={negResult.lead} color="blue" animate/>
            <div className="divider"/>
            <div style={{display:'flex',justifyContent:'space-between'}}>
              <span style={{fontSize:13,color:'var(--text2)'}}>Negotiation Score</span>
              <span style={{fontSize:20,fontWeight:800,color:'var(--blue)',fontFamily:'JetBrains Mono'}}>{negotiation}</span>
            </div>
          </div>
        </div>

        {/* Analysis */}
        <div className="card" style={{marginBottom:20}}>
          <div style={{fontSize:12,fontWeight:700,color:'var(--orange)',letterSpacing:1,textTransform:'uppercase',marginBottom:16}}>Expert Analysis</div>
          <div className="feedback-box">
            <strong style={{color:'var(--text)'}}>Overall Assessment: </strong>
            {feedback}
          </div>
          <div className="feedback-box" style={{borderColor:'var(--green)'}}>
            <strong style={{color:'var(--green)'}}>Best Decision: </strong>
            {bestAction?`Your choice of "${bestAction.name}" was strategically sound — ${bestAction.why}`:'Balanced decision-making throughout the simulation.'}
          </div>
          <div className="feedback-box" style={{borderColor:'var(--red)'}}>
            <strong style={{color:'var(--red)'}}>Biggest Gap: </strong>
            {`Your ${worstNames[worstMetricKey]} score of ${Math.round(metrics[worstMetricKey])}% was the weakest area. In real supply chains, this metric directly affects shareholder value and customer retention.`}
          </div>
        </div>

        {/* AI choices & lessons */}
        <div className="grid-2" style={{marginBottom:24}}>
          <div className="card">
            <div style={{fontSize:12,fontWeight:700,color:'var(--purple)',letterSpacing:1,textTransform:'uppercase',marginBottom:12}}>Your AI Portfolio</div>
            {selectedAI.map(t=>(
              <div key={t.id} style={{display:'flex',gap:12,alignItems:'center',padding:'10px 0',borderBottom:'1px solid var(--border)'}}>
                <span style={{fontSize:22}}>{t.icon}</span>
                <div>
                  <div style={{fontSize:14,fontWeight:600,color:'var(--text)'}}>{t.name}</div>
                  <div style={{fontSize:12,color:'var(--text3)'}}>{t.impact}</div>
                </div>
              </div>
            ))}
          </div>
          <div className="card">
            <div style={{fontSize:12,fontWeight:700,color:'var(--green)',letterSpacing:1,textTransform:'uppercase',marginBottom:12}}>Key Lessons Learned</div>
            {[
              'Supply chain resilience requires proactive investment, not reactive patching.',
              'Supplier diversification is the #1 defense against single-point failures.',
              'Customer communication during crises prevents permanent relationship damage.',
              'AI gives supply chains predictive power — visibility before visibility is lost.',
              'Post-crisis is the best time to invest in resilience — don\'t waste momentum.',
            ].map((l,i)=>(
              <div key={i} style={{display:'flex',gap:8,alignItems:'flex-start',marginBottom:8}}>
                <span style={{color:'var(--orange)',fontWeight:700,flexShrink:0}}>{i+1}.</span>
                <span style={{fontSize:13,color:'var(--text2)',lineHeight:1.5}}>{l}</span>
              </div>
            ))}
          </div>
        </div>

        {/* Recommendation */}
        <div style={{background:'linear-gradient(135deg,var(--orange-dim),transparent)',border:'1px solid var(--orange)',borderRadius:'var(--radius)',padding:24,marginBottom:32}}>
          <div style={{fontSize:12,fontWeight:700,color:'var(--orange)',letterSpacing:1,textTransform:'uppercase',marginBottom:8}}>Expert Recommendation</div>
          <div style={{fontSize:15,color:'var(--text)',lineHeight:1.7}}>
            {overall>=80?'Excellent work. To reach the next level, focus on embedding predictive AI across all supply chain nodes and building a formal Supplier Relationship Management (SRM) program. The best supply chains don\'t just survive crises — they gain competitive advantage from them.'
            :overall>=65?'You have solid fundamentals. The next step is moving from reactive to predictive. Invest in demand sensing technology and formalize your backup supplier qualification process BEFORE the next crisis hits.'
            :'Focus on the fundamentals: maintain minimum 45 days of safety stock for critical components, qualify at least 2 backup suppliers for each tier-1 supplier, and create a crisis communication playbook. These three actions alone prevent 80% of supply chain crises.'}
          </div>
        </div>

        <div style={{textAlign:'center'}}>
          <div style={{display:'flex',gap:14,justifyContent:'center',flexWrap:'wrap',marginBottom:14}}>
            <button className="btn btn-primary btn-lg" onClick={onReplay}>
              🔄 Play Again
            </button>
            <button className="btn btn-lg" onClick={printReport}
              style={{background:'linear-gradient(135deg,#0a2550,#051a3a)',color:'#00e5ff',border:'1.5px solid #1a4a7a',boxShadow:'0 0 20px #00e5ff22,0 4px 16px rgba(0,0,0,0.4)',fontWeight:700,letterSpacing:0.5}}>
              🖨️ Print PDF Report
            </button>
          </div>
          <div style={{fontSize:12,color:'var(--text3)'}}>Every playthrough generates a different company, crisis, and set of challenges</div>
          <div style={{fontSize:11,color:'var(--text3)',marginTop:4,opacity:0.7}}>PDF report opens in a new tab with navy blue theme · use browser Print to save</div>
        </div>
      </div>
    </div>
  );
}

// ─── MAIN APP ────────────────────────────────────────────────────────────────
function App(){
  const [step,setStep]=useState(0);
  const [company,setCompany]=useState(null);
  const [crisis,setCrisis]=useState(null);
  const [metrics,setMetrics]=useState(null);
  const [actions]=useState(()=>pickN(ACTIONS,6));
  const [selectedActions,setSelectedActions]=useState([]);
  const [simulated,setSimulated]=useState(false);
  const [negResult,setNegResult]=useState(null);
  const [ceoScore,setCeoScore]=useState(0);
  const [aiChoices,setAiChoices]=useState([]);

  function start(){
    const c=generateCompany();
    const cr=generateCrisis();
    const m=generateMetrics();
    setCompany(c);
    setCrisis(cr);
    setMetrics(m);
    setSelectedActions([]);
    setSimulated(false);
    setNegResult(null);
    setCeoScore(0);
    setAiChoices([]);
    setStep(1);
  }

  function toggleAction(id){
    setSelectedActions(prev=>
      prev.includes(id)?prev.filter(x=>x!==id):[...prev,id]
    );
    setSimulated(false);
  }

  function handleWarRoom(proceed){
    // Apply action effects to metrics
    const updated={...metrics};
    selectedActions.forEach(id=>{
      const a=ACTIONS.find(x=>x.id===id);
      if(!a)return;
      updated.cost=clamp(updated.cost+a.cost,0,100);
      updated.inventory=clamp(updated.inventory+a.inventory,0,100);
      updated.profit=clamp(updated.profit+a.profit,0,100);
      updated.speed=clamp(updated.speed+a.speed,0,100);
      updated.satisfaction=clamp(updated.satisfaction+a.satisfaction,0,100);
    });
    setMetrics(updated);
    setSimulated(true);
    if(proceed)setStep(4);
  }

  function replay(){
    setStep(0);
  }

  function startDemo(){
    const c=generateCompany();
    const cr=generateCrisis();
    // Hard-set high metrics so overall lands 85–88
    // Formula: cost*0.15+inv*0.15+profit*0.15+speed*0.1+sat*0.15+neg*0.1+ceo*0.1+ai_bonus
    // 92*0.15+90*0.15+88*0.15+93*0.1+95*0.15 + 88*0.1 + 100*0.1 + 1 ≈ 87
    const demoM={cost:92,inventory:90,profit:88,speed:93,satisfaction:95};
    setCompany(c);
    setCrisis(cr);
    setMetrics(demoM);
    setSelectedActions(['air','alt_supplier','comms']);
    setSimulated(true);
    setNegResult({trust:88,price:84,lead:82,score:88,choices:[3,0,2,1]});
    setCeoScore(100);
    setAiChoices(['forecast','risk']);
    setStep(7);
  }

  return(
    <div className="app">
      {step===0&&<WelcomeScreen onStart={start} onDemo={startDemo}/>}
      {step===1&&company&&<CompanyScreen company={company} onNext={()=>setStep(2)}/>}
      {step===2&&crisis&&company&&<CrisisScreen crisis={crisis} company={company} onNext={()=>setStep(3)}/>}
      {step===3&&metrics&&(
        <WarRoomScreen
          actions={actions}
          selectedActions={selectedActions}
          onToggle={toggleAction}
          onNext={handleWarRoom}
          metrics={metrics}
          simulated={simulated}
        />
      )}
      {step===4&&<NegotiationScreen onComplete={r=>{setNegResult(r);setStep(5);}}/>}
      {step===5&&<CEOScreen onComplete={s=>{setCeoScore(s);setStep(6);}}/>}
      {step===6&&<AIScreen onComplete={c=>{setAiChoices(c);setStep(7);}}/>}
      {step===7&&negResult&&(
        <DashboardScreen
          data={{company,crisis,metrics,negResult,ceoScore,aiChoices,actions:selectedActions}}
          onReplay={replay}
        />
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
