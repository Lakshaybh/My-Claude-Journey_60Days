<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Marketing Detective</title>
<style>
  :root{
    --bg-base:#05070C; --bg-surface:#0B0F17; --bg-card:#11151F; --bg-card-hover:#161B28;
    --border-subtle:#1B2230; --border-active:#2C3448;
    --text-primary:#E7ECF5; --text-secondary:#93A0B8; --text-muted:#57647B;
    --accent:#3E8FFF; --accent-hover:#5FA3FF; --accent-dim:#2C6FD1;
    --accent-glow:rgba(62,143,255,0.25);
    --danger:#FF4D4D; --danger-soft:rgba(255,77,77,0.1);
    --cork:#6b4a2d; --cork-dark:#4d341f;
    --paper:#eee3c8; --paper-shadow:rgba(0,0,0,.45);
    --font-sans:"Segoe UI", -apple-system, Roboto, system-ui, sans-serif;
    --font-serif:"Georgia","Times New Roman",serif;
    --ease:cubic-bezier(.2,.85,.3,1);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:
      radial-gradient(1100px 600px at 10% -10%, rgba(62,143,255,.08), transparent 60%),
      radial-gradient(900px 500px at 100% 0%, rgba(62,143,255,.05), transparent 55%),
      var(--bg-base);
    color:var(--text-primary); font-family:var(--font-sans); line-height:1.6; min-height:100vh;
    overflow-x:hidden;
  }
  ::selection{ background:var(--accent-glow); }
  :focus-visible{ outline:2px solid var(--accent); outline-offset:2px; }
  .hidden{ display:none !important; }
  .container{ max-width:1180px; margin:0 auto; padding:0 20px; }

  @keyframes fadeSlideIn{ from{opacity:0; transform:translateY(16px);} to{opacity:1; transform:translateY(0);} }
  @keyframes fadeIn{ from{opacity:0;} to{opacity:1;} }
  @keyframes popIn{ 0%{opacity:0; transform:scale(.85);} 70%{transform:scale(1.03);} 100%{opacity:1; transform:scale(1);} }
  @keyframes stampSlam{
    0%{ opacity:0; transform:scale(3) rotate(-18deg); }
    60%{ opacity:1; transform:scale(0.92) rotate(-10deg); }
    80%{ transform:scale(1.05) rotate(-12deg); }
    100%{ opacity:1; transform:scale(1) rotate(-10deg); }
  }
  @keyframes flicker{ 0%,100%{opacity:1;} 45%{opacity:.85;} 50%{opacity:1;} 52%{opacity:.7;} 55%{opacity:1;} }
  @keyframes pulseGlow{ 0%,100%{ box-shadow:0 0 0 0 var(--accent-glow);} 50%{ box-shadow:0 0 0 8px transparent;} }
  @keyframes floatIn{ from{opacity:0; transform:translateY(24px) rotate(var(--r,0deg));} to{opacity:1; transform:translateY(0) rotate(var(--r,0deg));} }

  .screen{ animation:fadeSlideIn .5s var(--ease); }

  /* ---------- Header ---------- */
  header.app-header{
    border-bottom:1px solid var(--border-subtle); padding:16px 0; position:sticky; top:0; z-index:30;
    background:rgba(5,7,12,.85); backdrop-filter:blur(10px);
  }
  .app-header .row{ display:flex; align-items:center; justify-content:space-between; gap:16px; flex-wrap:wrap; }
  .brand{ display:flex; align-items:center; gap:10px; }
  .brand-badge{
    width:34px; height:34px; border-radius:8px; background:var(--accent-glow);
    border:1px solid var(--accent); display:flex; align-items:center; justify-content:center;
    font-size:16px; color:var(--accent); animation:pulseGlow 3s ease-in-out infinite;
  }
  .brand-name{ font-weight:800; letter-spacing:-.01em; font-size:16px; font-family:var(--font-serif); }
  .brand-tag{ color:var(--text-muted); font-size:11px; letter-spacing:.14em; text-transform:uppercase; font-weight:700; }
  .case-counter{ font-size:12px; color:var(--text-secondary); font-variant-numeric:tabular-nums; }

  .progress-steps{ display:flex; gap:6px; margin-top:14px; }
  .progress-step{ flex:1; height:4px; border-radius:99px; background:var(--border-subtle); overflow:hidden; }
  .progress-step.done{ background:linear-gradient(90deg,var(--accent-dim),var(--accent)); box-shadow:0 0 10px var(--accent-glow); }
  .progress-step.current{ background:var(--border-active); position:relative; }
  .progress-step.current::after{
    content:""; position:absolute; inset:0; background:linear-gradient(90deg,var(--accent-dim),var(--accent));
    animation:sweep 1.6s var(--ease) infinite;
  }
  @keyframes sweep{ from{ transform:translateX(-100%);} to{ transform:translateX(100%);} }

  main{ padding:44px 0 96px; }

  .eyebrow{ font-size:11px; font-weight:700; letter-spacing:.16em; text-transform:uppercase; color:var(--accent); margin:0 0 10px; }
  h1{ font-size:clamp(28px,4vw,42px); font-weight:800; letter-spacing:-.02em; line-height:1.1; margin:0 0 14px; font-family:var(--font-serif); }
  h2{ font-size:24px; font-weight:760; letter-spacing:-.01em; margin:0 0 10px; font-family:var(--font-serif); }
  h3{ font-size:16px; font-weight:700; margin:0 0 8px; }
  p.lead{ font-size:15.5px; color:var(--text-secondary); max-width:66ch; }

  .card{
    background:var(--bg-card); border:1px solid var(--border-subtle); border-radius:12px; padding:24px;
    box-shadow:0 6px 24px rgba(0,0,0,.4), inset 0 1px 0 rgba(255,255,255,.03);
    transition:transform .3s var(--ease), border-color .3s var(--ease);
  }
  .card:hover{ border-color:var(--border-active); }

  .btn{
    display:inline-flex; align-items:center; justify-content:center; gap:8px; font-family:inherit;
    font-size:14px; font-weight:700; letter-spacing:.02em; border-radius:8px; padding:12px 22px;
    cursor:pointer; border:1px solid transparent; transition:transform .2s var(--ease), background .2s var(--ease), box-shadow .2s var(--ease);
  }
  .btn:hover{ transform:translateY(-2px); }
  .btn:active{ transform:translateY(0); }
  .btn:disabled{ opacity:.4; cursor:not-allowed; transform:none; }
  .btn-primary{ background:var(--accent); color:#04101f; box-shadow:0 8px 22px var(--accent-glow); }
  .btn-primary:hover:not(:disabled){ background:var(--accent-hover); }
  .btn-secondary{ background:transparent; color:var(--text-primary); border-color:var(--border-active); }
  .btn-secondary:hover{ background:var(--bg-card-hover); border-color:var(--accent); }
  .btn-row{ display:flex; gap:12px; flex-wrap:wrap; margin-top:22px; }

  /* ---------- SCREEN 0: BRIEFING ---------- */
  .briefing-wrap{ text-align:center; padding:60px 0 20px; }
  .badge-icon{
    width:72px; height:72px; margin:0 auto 22px; border-radius:50%;
    background:radial-gradient(circle at 35% 30%, var(--accent-glow), transparent 70%), var(--bg-card);
    border:1px solid var(--accent); display:flex; align-items:center; justify-content:center; font-size:32px;
  }
  .briefing-wrap h1{ margin-bottom:10px; }
  .briefing-wrap p.lead{ margin:0 auto 30px; }

  /* ---------- SCREEN 1: CASE ASSIGNMENT ---------- */
  .file-stage{ display:flex; justify-content:center; padding:24px 0; }
  .case-folder{
    width:min(520px,92vw); background:linear-gradient(180deg,#1b2233,#141a29);
    border:1px solid var(--border-active); border-radius:6px 6px 10px 10px; position:relative;
    box-shadow:0 20px 50px rgba(0,0,0,.55); animation:popIn .6s var(--ease);
    padding:28px 26px 26px;
  }
  .case-folder::before{
    content:"CONFIDENTIAL"; position:absolute; top:-13px; left:24px; background:var(--danger);
    color:#1a0303; font-size:10px; font-weight:800; letter-spacing:.1em; padding:4px 10px; border-radius:3px;
    box-shadow:0 4px 10px rgba(0,0,0,.4);
  }
  .case-folder .tab{
    position:absolute; top:-18px; right:24px; background:var(--bg-card); border:1px solid var(--border-active);
    border-bottom:none; padding:6px 14px; font-size:11px; letter-spacing:.08em; color:var(--text-muted);
    border-radius:6px 6px 0 0; font-weight:700;
  }
  .case-folder .case-id{ font-size:11px; color:var(--accent); letter-spacing:.1em; font-weight:700; margin-bottom:6px; }
  .case-folder h2{ margin-bottom:16px; }
  .case-meta-grid{ display:grid; grid-template-columns:1fr 1fr; gap:14px; margin-top:16px; }
  .case-meta-item{ background:var(--bg-surface); border:1px solid var(--border-subtle); border-radius:8px; padding:12px 14px; }
  .case-meta-item .k{ font-size:10px; text-transform:uppercase; letter-spacing:.08em; color:var(--text-muted); font-weight:700; margin-bottom:5px; }
  .case-meta-item .v{ font-size:14px; font-weight:600; }
  .stamp-hint{ margin-top:20px; font-size:12.5px; color:var(--text-muted); font-style:italic; }

  /* ---------- SCREEN 2: INVESTIGATION BOARD ---------- */
  .board-wrap{
    position:relative; border-radius:14px; overflow:hidden; min-height:780px;
    background:
      repeating-radial-gradient(circle at 20% 20%, rgba(0,0,0,.08) 0 2px, transparent 2px 6px),
      repeating-radial-gradient(circle at 70% 60%, rgba(0,0,0,.06) 0 2px, transparent 2px 6px),
      linear-gradient(160deg, var(--cork), var(--cork-dark));
    border:1px solid var(--border-active);
    box-shadow:inset 0 0 90px rgba(0,0,0,.55), 0 20px 50px rgba(0,0,0,.5);
    padding:26px;
  }
  .board-instructions{
    color:#f4e9d0; background:rgba(0,0,0,.35); border:1px dashed rgba(244,233,208,.4);
    border-radius:8px; padding:10px 14px; font-size:12.5px; margin-bottom:18px; display:inline-block;
  }
  .board-surface{ position:relative; min-height:680px; }

  .sticky{
    position:absolute; width:230px; min-height:150px; padding:16px 16px 14px; border-radius:2px;
    cursor:grab; user-select:none; animation:floatIn .5s var(--ease) both;
    box-shadow:0 10px 20px var(--paper-shadow), 0 2px 4px rgba(0,0,0,.3);
    font-family:var(--font-serif); color:#1c1a12; transition:box-shadow .2s var(--ease);
    background:var(--paper);
  }
  .sticky:active{ cursor:grabbing; box-shadow:0 22px 34px rgba(0,0,0,.55); z-index:50 !important; }
  .sticky.yellow{ background:#f0dd6a; }
  .sticky.blue{ background:#a9d3f5; }
  .sticky.pink{ background:#f3b8c9; }
  .sticky.green{ background:#bfe3ac; }
  .sticky.orange{ background:#f3c98a; }
  .sticky .pin{
    position:absolute; top:-9px; left:50%; transform:translateX(-50%); width:16px; height:16px; border-radius:50%;
    background:radial-gradient(circle at 35% 30%, #ff8a8a, #b21f1f); box-shadow:0 3px 6px rgba(0,0,0,.5);
  }
  .sticky .stitle{ font-size:11px; font-weight:800; text-transform:uppercase; letter-spacing:.06em; margin-bottom:8px; opacity:.75; }
  .sticky .scontent{ font-size:13.5px; line-height:1.45; }
  .sticky .scontent ul{ margin:4px 0 0; padding-left:16px; }
  .sticky .scontent li{ margin-bottom:2px; }

  .string-svg{ position:absolute; inset:0; pointer-events:none; z-index:1; }

  .evidence-toggle-row{ display:flex; gap:10px; flex-wrap:wrap; margin-bottom:16px; }
  .pill-btn{
    background:rgba(0,0,0,.35); border:1px solid rgba(244,233,208,.35); color:#f4e9d0;
    padding:7px 14px; border-radius:99px; font-size:12px; font-weight:700; cursor:pointer;
    transition:all .2s var(--ease);
  }
  .pill-btn:hover{ background:rgba(0,0,0,.55); border-color:var(--accent); }
  .pill-btn.active{ background:var(--accent); color:#04101f; border-color:var(--accent); }

  .suspect-rail{
    margin-top:26px; background:var(--bg-card); border:1px solid var(--border-subtle); border-radius:12px; padding:22px 24px;
  }
  .suspect-grid{ display:grid; grid-template-columns:repeat(auto-fit,minmax(230px,1fr)); gap:14px; margin-top:14px; }
  .suspect-card{
    background:var(--bg-surface); border:1px solid var(--border-subtle); border-radius:10px; padding:16px;
    cursor:pointer; transition:all .2s var(--ease); position:relative;
  }
  .suspect-card:hover{ border-color:var(--accent); transform:translateY(-3px); box-shadow:0 8px 20px rgba(0,0,0,.4); }
  .suspect-card.selected{ border-color:var(--accent); background:var(--accent-glow); }
  .suspect-card .num{ font-size:11px; color:var(--accent); font-weight:800; letter-spacing:.06em; margin-bottom:6px; }
  .suspect-card .label{ font-size:14px; font-weight:700; }

  /* ---------- SOLVE MODAL ---------- */
  .modal-overlay{
    position:fixed; inset:0; background:rgba(2,4,9,.72); backdrop-filter:blur(4px);
    display:flex; align-items:center; justify-content:center; z-index:100; padding:20px; animation:fadeIn .25s ease;
  }
  .modal-box{
    max-width:520px; width:100%; background:var(--bg-card); border:1px solid var(--border-active);
    border-radius:14px; padding:28px; box-shadow:0 30px 70px rgba(0,0,0,.6); animation:popIn .35s var(--ease);
  }

  /* ---------- CASE CLOSED ---------- */
  .closed-wrap{ text-align:center; position:relative; padding:40px 0 10px; }
  .stamp{
    display:inline-block; border:6px solid var(--accent); color:var(--accent); font-family:var(--font-serif);
    font-weight:800; font-size:clamp(28px,6vw,46px); letter-spacing:.06em; padding:12px 28px; border-radius:10px;
    transform:rotate(-10deg); animation:stampSlam .7s var(--ease) both; text-transform:uppercase;
    box-shadow:0 0 30px var(--accent-glow);
  }
  .stamp.wrong{ border-color:var(--danger); color:var(--danger); box-shadow:0 0 30px var(--danger-soft); }

  .verdict-row{ display:flex; justify-content:center; gap:14px; margin-top:22px; flex-wrap:wrap; }
  .verdict-tile{
    background:var(--bg-card); border:1px solid var(--border-subtle); border-radius:10px; padding:16px 20px; min-width:150px;
  }
  .verdict-tile .k{ font-size:10px; text-transform:uppercase; color:var(--text-muted); font-weight:700; letter-spacing:.06em; margin-bottom:6px; }
  .verdict-tile .v{ font-size:20px; font-weight:800; color:var(--accent); font-variant-numeric:tabular-nums; }

  .explain-card{ text-align:left; margin-top:28px; }
  .improve-list{ list-style:none; padding:0; margin:12px 0 0; display:grid; gap:10px; }
  .improve-list li{
    display:flex; gap:12px; background:var(--bg-surface); border:1px solid var(--border-subtle); border-radius:10px; padding:14px 16px;
  }
  .improve-num{
    flex-shrink:0; width:24px; height:24px; border-radius:50%; background:var(--accent-glow); color:var(--accent);
    font-weight:800; font-size:12px; display:flex; align-items:center; justify-content:center;
  }

  /* ---------- LEARNING REPORT ---------- */
  .metric-charts{ display:grid; grid-template-columns:repeat(auto-fit,minmax(200px,1fr)); gap:16px; margin:20px 0; }
  .chart-tile{ background:var(--bg-surface); border:1px solid var(--border-subtle); border-radius:10px; padding:16px; }
  .chart-tile .k{ font-size:11px; text-transform:uppercase; color:var(--text-muted); font-weight:700; letter-spacing:.06em; margin-bottom:10px; }
  .bar-track{ height:8px; border-radius:99px; background:var(--border-subtle); overflow:hidden; margin-bottom:6px; }
  .bar-fill{ height:100%; border-radius:99px; width:0%; background:linear-gradient(90deg,var(--accent-dim),var(--accent)); transition:width 1.1s var(--ease); box-shadow:0 0 10px var(--accent-glow); }
  .chart-tile .val{ font-size:18px; font-weight:800; font-variant-numeric:tabular-nums; }

  .stat-strip{ display:flex; gap:14px; flex-wrap:wrap; margin:20px 0; }
  .stat-pill{ background:var(--bg-card); border:1px solid var(--border-subtle); border-radius:10px; padding:14px 20px; text-align:center; min-width:120px; }
  .stat-pill .num{ font-size:26px; font-weight:800; color:var(--accent); font-variant-numeric:tabular-nums; }
  .stat-pill .lbl{ font-size:11px; color:var(--text-muted); text-transform:uppercase; letter-spacing:.06em; font-weight:700; margin-top:4px; }

  footer.app-footer{ border-top:1px solid var(--border-subtle); padding:24px 0; text-align:center; color:var(--text-muted); font-size:12px; }

  @media (max-width:760px){
    .case-meta-grid{ grid-template-columns:1fr; }
    .board-wrap{ min-height:auto; }
    .board-surface{ min-height:1400px; }
    .sticky{ position:relative !important; margin-bottom:16px; width:100%; left:auto !important; top:auto !important; }
    .string-svg{ display:none; }
  }
  @media (prefers-reduced-motion: reduce){
    *{ animation-duration:.001s !important; transition-duration:.001s !important; }
  }

  #printReport{ display:none; }
  @media print{
    header.app-header, footer.app-footer, .btn-row, .modal-overlay{ display:none !important; }
    body{ background:#fff !important; }
    #app{ display:none !important; }
    #printReport{ display:block !important; }
  }
</style>
</head>
<body>

<header class="app-header">
  <div class="container row">
    <div class="brand">
      <span class="brand-badge">&#128269;</span>
      <div>
        <div class="brand-name">Marketing Detective</div>
        <div class="brand-tag">Campaign Investigation Bureau</div>
      </div>
    </div>
    <span class="case-counter" id="caseCounter">Case files reviewed: 0</span>
  </div>
  <div class="container">
    <div class="progress-steps" id="progressSteps"></div>
  </div>
</header>

<main class="container" id="app"></main>
<div id="printReport"></div>

<footer class="app-footer">All companies, campaigns, metrics, and comments in this application are fictional and created for instructional purposes only.</footer>

<script>
(function(){

  /* =========================================================
     CASE DATA
  ========================================================= */
  var CASES = [
    {
      company:"Lumen & Oak Skincare", industry:"D2C Beauty / Skincare",
      objective:"Drive first-time purchases of a new retinol serum through paid social.",
      audience:"Women aged 25-40 interested in clean beauty and skincare routines.",
      channels:["Instagram Ads","TikTok Ads","Email Newsletter"],
      budget:[{c:"Instagram Ads",p:55},{c:"TikTok Ads",p:30},{c:"Email Newsletter",p:15}],
      metrics:{reach:"1.2M", ctr:"0.4%", engagement:"2.1%", conversions:"312", sales:"$9,360"},
      comments:[
        "\"The ad looked amazing but the website took forever to load on my phone.\"",
        "\"I clicked three times before I found the actual product page.\"",
        "\"Price wasn't shown until checkout, felt sketchy.\""
      ],
      social:"High impressions and saves on Instagram, but comments show repeated complaints about a slow, confusing checkout flow.",
      primaryMistake:"Broken mobile checkout experience",
      clues:[
        "CTR is unusually low (0.4%) despite strong reach and creative engagement, suggesting an attention problem exists after the click, not before it.",
        "Multiple customer comments independently mention slow load times and a confusing path to the product page on mobile.",
        "92% of ad traffic was mobile, but the site's conversion rate on mobile is less than a third of desktop."
      ],
      explanation:"The creative and targeting were working well, generating strong reach and social engagement. The campaign failed because the mobile landing experience was slow and disorienting, causing interested users to abandon before completing a purchase. The budget was optimized for attention, not for the point of friction that was actually losing customers.",
      improvements:[
        "Audit and optimize mobile page load speed before scaling any paid spend.",
        "Simplify the path from ad click to product page to a single tap.",
        "Display price and shipping cost upfront to reduce checkout abandonment."
      ],
      suspects:["Broken mobile checkout experience","Wrong audience targeting on Instagram","Weak ad creative with low engagement","Insufficient overall ad budget"]
    },
    {
      company:"Northfield Fitness App", industry:"Health & Fitness Technology",
      objective:"Increase free-to-paid subscription conversions during a 30-day trial push.",
      audience:"Adults 22-45 who downloaded the app but have not subscribed.",
      channels:["Push Notifications","Email","In-App Banners"],
      budget:[{c:"Push Notifications",p:20},{c:"Email",p:30},{c:"In-App Banners",p:50}],
      metrics:{reach:"480K", ctr:"3.8%", engagement:"5.2%", conversions:"640", sales:"$19,200"},
      comments:[
        "\"I got the same reminder email four times in one day.\"",
        "\"The push notifications felt aggressive, I turned them off entirely.\"",
        "\"I would have upgraded eventually but the constant nagging pushed me away.\""
      ],
      social:"App store reviews show a spike in one-star ratings mentioning notification fatigue during the campaign window.",
      primaryMistake:"Excessive message frequency causing notification fatigue",
      clues:[
        "Engagement rate is healthy at 5.2%, showing the message content itself was not the problem.",
        "One-star app store reviews increased sharply and specifically cite notification frequency, not the product.",
        "Unsubscribe and notification opt-out rates rose 3x during the exact week the campaign intensified messaging."
      ],
      explanation:"The campaign confused frequency with persuasion. Sending multiple reminders per day across three channels overwhelmed users who might have converted on their own timeline, and instead drove them to disable notifications entirely or abandon the app, cutting off future opportunities to convert them.",
      improvements:[
        "Cap total cross-channel touchpoints per user to one or two per day.",
        "Use behavioral triggers instead of blanket scheduling, message only users who show drop-off signals.",
        "A/B test message spacing to find the frequency that maximizes conversion without increasing opt-outs."
      ],
      suspects:["Excessive message frequency causing notification fatigue","Trial period was too short to build habit","Pricing was set too high for the audience","In-app banners were visually unappealing"]
    },
    {
      company:"Marrow & Co Steakhouse Group", industry:"Restaurant / Hospitality",
      objective:"Fill reservations at three new locations using a limited-time discount.",
      audience:"Local diners aged 30-55 within a 15-mile radius of each location.",
      channels:["Facebook Ads","Local Radio","Google Search Ads"],
      budget:[{c:"Facebook Ads",p:40},{c:"Local Radio",p:35},{c:"Google Search Ads",p:25}],
      metrics:{reach:"310K", ctr:"1.9%", engagement:"3.0%", conversions:"85", sales:"$6,800"},
      comments:[
        "\"I tried to book the discount online but the reservation system didn't have the promo code field.\"",
        "\"Called the restaurant directly and they said they'd never heard of the discount.\"",
        "\"Radio ad said 'this week only' but I heard it running for a full month.\""
      ],
      social:"Local Facebook group threads show confused customers asking staff about a promotion the restaurant couldn't confirm.",
      primaryMistake:"Internal teams were not aligned before the campaign launched",
      clues:[
        "Reservation conversions are extremely low relative to reach and click-through, despite decent ad engagement.",
        "Restaurant staff, when contacted directly by customers, could not confirm or honor the advertised discount.",
        "The online booking system had no field to apply the promotional code referenced in every ad."
      ],
      explanation:"The marketing message was clear and reached the right audience, but the operations, reservation system, and front-of-house staff were never briefed on the promotion. Customers who tried to redeem the offer hit a dead end, which not only lost the sale but damaged trust in the brand's other advertised offers.",
      improvements:[
        "Run a pre-launch checklist that confirms redemption mechanics work end-to-end before any ad spends.",
        "Brief all customer-facing staff on active promotions with a shared reference sheet.",
        "Set a fixed, honestly communicated promotion window instead of an open-ended 'this week only' claim."
      ],
      suspects:["Internal teams were not aligned before the campaign launched","Radio ads reached the wrong local audience","Google Search Ads had irrelevant keywords","Discount amount was not compelling enough"]
    },

  /* =========================================================
     STATE
  ========================================================= */
  var STEPS = ["briefing","assignment","board","report"];
  var state = {
    step:0,
    caseIndex:null,
    lastCaseIndex:null,
    casesReviewed:0,
    selectedSuspect:null,
    solved:false,
    wasCorrect:false
  };

  var app = document.getElementById("app");
  var progressStepsEl = document.getElementById("progressSteps");
  var caseCounterEl = document.getElementById("caseCounter");

  function renderProgress(){
    var html = "";
    for(var i=0;i<STEPS.length;i++){
      var cls = "progress-step";
      if(i < state.step) cls += " done";
      else if(i === state.step) cls += " current";
      html += '<div class="' + cls + '"></div>';
    }
    progressStepsEl.innerHTML = html;
    caseCounterEl.textContent = "Case files reviewed: " + state.casesReviewed;
  }

  function pickNewCase(){
    if(CASES.length === 1){ return 0; }
    var idx;
    do{ idx = Math.floor(Math.random() * CASES.length); }while(idx === state.lastCaseIndex);
    return idx;
  }

  function startNewCase(){
    state.caseIndex = pickNewCase();
    state.lastCaseIndex = state.caseIndex;
    state.selectedSuspect = null;
    state.solved = false;
    state.wasCorrect = false;
    state.step = 1;
    render();
  }
  window.startNewCase = startNewCase;

  function goToBoard(){ state.step = 2; render(); }
  window.goToBoard = goToBoard;

  function backToBriefing(){ state.step = 0; render(); }
  window.backToBriefing = backToBriefing;

  var stickyLayout = null;

    return [
      { id:"budget", color:"yellow", title:"Budget allocation", r:-3,
        html:'<ul>' + c.budget.map(function(b){ return '<li>' + esc(b.c) + ': ' + b.p + '%</li>'; }).join("") + '</ul>' },
      { id:"metrics", color:"blue", title:"Campaign metrics", r:2,
        html:'<ul><li>Reach: ' + esc(c.metrics.reach) + '</li><li>CTR: ' + esc(c.metrics.ctr) + '</li><li>Engagement: ' + esc(c.metrics.engagement) + '</li><li>Conversions: ' + esc(c.metrics.conversions) + '</li><li>Sales: ' + esc(c.metrics.sales) + '</li></ul>' },

        html:'<ul>' + c.comments.map(function(cm){ return '<li>' + esc(cm) + '</li>'; }).join("") + '</ul>' },

        html:'<div>' + esc(c.social) + '</div>' },
      { id:"clue1", color:"orange", title:"Supporting clue A", r:-1,
        html:'<div>' + esc(c.clues[0]) + '</div>' },

      { id:"clue3", color:"orange", title:"Supporting clue C", r:-2,
        html:'<div>' + esc(c.clues[2]) + '</div>' }
    ];
  }

  function initialPositions(count, w, h){
    var positions = [];
    var cols = 4;
    var cellW = Math.max(240, Math.floor(w / cols));
    var cellH = 210;
    for(var i=0;i<count;i++){
      var col = i % cols;
      var rowIdx = Math.floor(i / cols);
      var jitterX = (Math.random()*30-15);
      var jitterY = (Math.random()*24-12);
      positions.push({
        x: col*cellW + 20 + jitterX,
        y: rowIdx*cellH + 10 + jitterY
      });
    }
    return positions;
  }

  function renderBoard(){
    var c = CASES[state.caseIndex];
    var defs = buildStickyDefs(c);

    if(!stickyLayout || stickyLayout.caseIndex !== state.caseIndex){
      var positions = initialPositions(defs.length, 1080, 600);
      stickyLayout = { caseIndex: state.caseIndex, pos: {} };
      defs.forEach(function(d,i){ stickyLayout.pos[d.id] = positions[i]; });
    }

    var stickiesHtml = defs.map(function(d, i){
      var pos = stickyLayout.pos[d.id];
      return '<div class="sticky ' + d.color + '" id="sticky-' + d.id + '" data-id="' + d.id + '" '
        + 'style="left:' + pos.x + 'px; top:' + pos.y + 'px; --r:' + d.r + 'deg; transform:rotate(' + d.r + 'deg); animation-delay:' + (i*0.06) + 's;">'
        + '<div class="pin"></div>'
        + '<div class="stitle">' + esc(d.title) + '</div>'
        + '<div class="scontent">' + d.html + '</div>'
        + '</div>';
    }).join("");

    var suspectsHtml = c.suspects.map(function(s, i){
      var selected = (state.selectedSuspect === i) ? " selected" : "";
      return '<div class="suspect-card' + selected + '" data-idx="' + i + '" onclick="selectSuspect(' + i + ')">'
        + '<div class="num">Suspect ' + String.fromCharCode(65+i) + '</div>'
        + '<div class="label">' + esc(s) + '</div>'
        + '</div>';
    }).join("");

    var html = ''
      + '<section class="screen">'
      + '  <p class="eyebrow">Investigation Board &mdash; ' + esc(c.company) + '</p>'
      + '  <h2>Study the evidence. Drag notes around the corkboard to compare them.</h2>'
      + '  <div class="board-instructions">Tip: click and drag any sticky note to rearrange the board.</div>'
      + '  <div class="board-wrap">'
      + '    <div class="board-surface" id="boardSurface">' + stickiesHtml + '</div>'
      + '  </div>'
      + '  <div class="suspect-rail">'
      + '    <h3>Name the prime suspect: the one true marketing mistake</h3>'
      + '    <p class="lead" style="font-size:13.5px;">Based on the evidence board, choose the mistake that best explains what went wrong.</p>'
      + '    <div class="suspect-grid">' + suspectsHtml + '</div>'
      + '    <div class="btn-row">'
      + '      <button class="btn btn-secondary" onclick="state.step=1;render();">Back to case file</button>'
      + '      <button class="btn btn-secondary" onclick="runDemo()">&#9654; Run auto-demo</button>'
      + '      <button class="btn btn-primary" id="solveBtn" disabled onclick="openSolveModal()">Accuse &amp; solve the case</button>'
      + '    </div>'
      + '  </div>'
      + '</section>';

    return html;
  }

  window.selectSuspect = function(i){
    state.selectedSuspect = i;
    document.querySelectorAll(".suspect-card").forEach(function(el){ el.classList.remove("selected"); });
    var target = document.querySelector('.suspect-card[data-idx="' + i + '"]');
    if(target) target.classList.add("selected");
    var btn = document.getElementById("solveBtn");
    if(btn) btn.disabled = false;
  };

  window.runDemo = function(){
    var c = CASES[state.caseIndex];
    var correctIdx = c.suspects.indexOf(c.primaryMistake);
    if(correctIdx === -1) correctIdx = 0;
    selectSuspect(correctIdx);
    var target = document.querySelector('.suspect-card[data-idx="' + correctIdx + '"]');
    if(target) target.scrollIntoView({behavior:"smooth", block:"center"});
    setTimeout(function(){
      openSolveModal();
      setTimeout(function(){ confirmSolve(); }, 1300);
    }, 900);
  };

  function enableDragging(){
    var surface = document.getElementById("boardSurface");
    if(!surface) return;
    var activeEl = null, offsetX = 0, offsetY = 0;

    surface.querySelectorAll(".sticky").forEach(function(el){
      el.addEventListener("pointerdown", function(e){
        activeEl = el;
        var rect = el.getBoundingClientRect();
        var surfRect = surface.getBoundingClientRect();
        offsetX = e.clientX - rect.left;
        offsetY = e.clientY - rect.top;
        el.style.zIndex = 40;
        el.setPointerCapture(e.pointerId);
      });
      el.addEventListener("pointermove", function(e){
        if(activeEl !== el) return;
        var surfRect = surface.getBoundingClientRect();
        var newX = e.clientX - surfRect.left - offsetX;
        var newY = e.clientY - surfRect.top - offsetY;
        newX = Math.max(0, newX);
        newY = Math.max(0, newY);
        el.style.left = newX + "px";
        el.style.top = newY + "px";
        var id = el.getAttribute("data-id");
        if(stickyLayout && stickyLayout.pos[id]){
          stickyLayout.pos[id].x = newX;
          stickyLayout.pos[id].y = newY;
        }
      });
      var release = function(e){ if(activeEl === el){ activeEl = null; } };
      el.addEventListener("pointerup", release);
      el.addEventListener("pointercancel", release);
    });
  }

      + '<div class="modal-box">'

      + '  <h2>Close the case on:</h2>'
      + '  <p class="lead" style="font-weight:700;color:var(--text-primary);">' + esc(chosen) + '</p>'
      + '  <p class="lead">Once you confirm, the case file will be sealed and the true verdict revealed.</p>'
      + '  <div class="btn-row">'
      + '    <button class="btn btn-secondary" onclick="closeSolveModal()">Keep investigating</button>'
      + '    <button class="btn btn-primary" onclick="confirmSolve()">Confirm &amp; close case</button>'
      + '  </div>'
      + '</div>';
    document.body.appendChild(overlay);
  };

    if(overlay) overlay.remove();
  };

  window.confirmSolve = function(){
    var c = CASES[state.caseIndex];
    state.wasCorrect = c.suspects[state.selectedSuspect] === c.primaryMistake;
    state.solved = true;
    state.casesReviewed += 1;
    closeSolveModal();
    state.step = 3;
    render();
  };

  /* =========================================================
     RENDER: CASE CLOSED + LEARNING REPORT
  ========================================================= */
  function renderReport(){
    var c = CASES[state.caseIndex];
    var stampCls = state.wasCorrect ? "stamp" : "stamp wrong";
    var stampText = state.wasCorrect ? "Case Closed" : "Case Reopened";

    var improvementsHtml = c.improvements.map(function(imp, i){
      return '<li><span class="improve-num">' + (i+1) + '</span><span>' + esc(imp) + '</span></li>';
    }).join("");

    var html = ''
      + '<section class="screen">'
      + '  <div class="closed-wrap">'
      + '    <div class="' + stampCls + '">' + stampText + '</div>'
      + '    <div class="verdict-row">'
      + '      <div class="verdict-tile"><div class="k">Your accusation</div><div class="v" style="font-size:14px;">' + esc(c.suspects[state.selectedSuspect]) + '</div></div>'
      + '      <div class="verdict-tile"><div class="k">Verdict</div><div class="v">' + (state.wasCorrect ? "Correct" : "Incorrect") + '</div></div>'
      + '      <div class="verdict-tile"><div class="k">Case number</div><div class="v" style="font-size:16px;">MD-' + (1000+state.caseIndex) + '</div></div>'
      + '    </div>'
      + '  </div>'

      + '  <div class="card explain-card">'
      + '    <h3>The true marketing mistake</h3>'
      + '    <p class="lead" style="color:var(--accent);font-weight:700;">' + esc(c.primaryMistake) + '</p>'
      + '    <h3 style="margin-top:18px;">Investigator\'s explanation</h3>'
      + '    <p class="lead">' + esc(c.explanation) + '</p>'
      + '    <h3 style="margin-top:18px;">Suggested improvements</h3>'
      + '    <ul class="improve-list">' + improvementsHtml + '</ul>'
      + '  </div>'

      + '  <div class="card" style="margin-top:20px;">'
      + '    <h3>Learning report</h3>'
      + '    <div class="stat-strip">'
      + '      <div class="stat-pill"><div class="num">' + state.casesReviewed + '</div><div class="lbl">Cases closed</div></div>'
      + '      <div class="stat-pill"><div class="num">' + (state.wasCorrect ? "1/1" : "0/1") + '</div><div class="lbl">This case verdict</div></div>'
      + '    </div>'
      + '    <div class="metric-charts">'
      + chartTile("Reach", c.metrics.reach, 90)
      + chartTile("CTR", c.metrics.ctr, parseFloat(c.metrics.ctr) ? Math.min(100, parseFloat(c.metrics.ctr) * 12) : 40)
      + chartTile("Engagement", c.metrics.engagement, parseFloat(c.metrics.engagement) ? Math.min(100, parseFloat(c.metrics.engagement) * 8) : 40)
      + chartTile("Conversions", String(c.metrics.conversions), 65)
      + '    </div>'
      + '    <p class="lead" style="margin-top:8px;">Key takeaway: the strongest campaigns still fail at a single point of friction. Reading reach and engagement alone would have missed this case, the real signal was in the gap between attention metrics and the customer comments.</p>'
      + '  </div>'

      + '  <div class="btn-row">'
      + '    <button class="btn btn-primary" onclick="downloadPdfReport()">&#128196; Download PDF report</button>'
      + '    <button class="btn btn-secondary" onclick="startNewCase()">Open a new case file</button>'
      + '    <button class="btn btn-secondary" onclick="backToBriefing()">Return to bureau desk</button>'
      + '  </div>'
      + '</section>';

    return html;
  }

  function downloadPdfReport(){
    var c = CASES[state.caseIndex];
    var caseNum = "MD-" + (1000 + state.caseIndex);
    var verdictColor = state.wasCorrect ? "#1f7a4d" : "#a83232";
    var verdictText = state.wasCorrect ? "SOLVED" : "REOPENED";

    var cluesHtml = c.clues.map(function(cl,i){
      return '<div style="margin-bottom:10px;"><strong>Clue ' + String.fromCharCode(65+i) + ':</strong> ' + esc(cl) + '</div>';
    }).join("");

    var improvementsHtml = c.improvements.map(function(imp,i){
      return '<li style="margin-bottom:8px;">' + esc(imp) + '</li>';
    }).join("");

    var metricRows = ['reach','ctr','engagement','conversions','sales'].map(function(k){
      return '<tr><td style="padding:6px 10px; color:#555; text-transform:capitalize; border-bottom:1px solid #eee;">' + esc(k) + '</td>'
        + '<td style="padding:6px 10px; font-weight:700; border-bottom:1px solid #eee;">' + esc(c.metrics[k]) + '</td></tr>';
    }).join("");

    var html = ''
      + '<div style="font-family:Georgia,\'Times New Roman\',serif; color:#171a22; max-width:820px; margin:0 auto; padding:36px 28px;">'

      + '<div style="display:flex; align-items:center; justify-content:space-between; border-bottom:3px solid #2C6FD1; padding-bottom:18px; margin-bottom:26px;">'
        + '<div>'
          + '<div style="font-size:10.5px; letter-spacing:.18em; text-transform:uppercase; color:#2C6FD1; font-weight:700;">Bureau of Marketing Investigations</div>'
          + '<h1 style="font-size:28px; margin:6px 0 0;">Marketing Detective &mdash; Case Report</h1>'
        + '</div>'
        + '<div style="text-align:right; border:2px solid ' + verdictColor + '; color:' + verdictColor + '; padding:8px 16px; border-radius:6px; font-weight:800; letter-spacing:.08em; transform:rotate(-4deg);">' + verdictText + '</div>'
      + '</div>'

      + '<table style="width:100%; font-size:13px; margin-bottom:26px; border-collapse:collapse;">'
        + '<tr><td style="padding:4px 0; color:#777; width:170px;">Case number</td><td style="padding:4px 0; font-weight:700;">' + caseNum + '</td></tr>'
        + '<tr><td style="padding:4px 0; color:#777;">Company</td><td style="padding:4px 0; font-weight:700;">' + esc(c.company) + '</td></tr>'
        + '<tr><td style="padding:4px 0; color:#777;">Industry</td><td style="padding:4px 0; font-weight:700;">' + esc(c.industry) + '</td></tr>'
        + '<tr><td style="padding:4px 0; color:#777;">Campaign objective</td><td style="padding:4px 0; font-weight:700;">' + esc(c.objective) + '</td></tr>'
        + '<tr><td style="padding:4px 0; color:#777;">Target audience</td><td style="padding:4px 0; font-weight:700;">' + esc(c.audience) + '</td></tr>'
      + '</table>'

      + '<div style="margin-bottom:26px;">'
        + '<h2 style="font-size:16px; border-bottom:1px solid #ddd; padding-bottom:6px; margin-bottom:12px;">Campaign metrics</h2>'
        + '<table style="width:100%; border-collapse:collapse; font-size:13px;">' + metricRows + '</table>'
      + '</div>'

      + '<div style="margin-bottom:26px; background:#f4f8ff; border:1px solid #d8e6ff; border-radius:10px; padding:18px 20px;">'
        + '<div style="font-size:11px; text-transform:uppercase; letter-spacing:.08em; color:#2C6FD1; font-weight:700; margin-bottom:6px;">Prime suspect identified</div>'
        + '<div style="font-size:18px; font-weight:800;">' + esc(c.primaryMistake) + '</div>'
      + '</div>'

      + '<div style="margin-bottom:26px;">'
        + '<h2 style="font-size:16px; border-bottom:1px solid #ddd; padding-bottom:6px; margin-bottom:12px;">Supporting clues</h2>'
        + cluesHtml
      + '</div>'

      + '<div style="margin-bottom:26px;">'
        + '<h2 style="font-size:16px; border-bottom:1px solid #ddd; padding-bottom:6px; margin-bottom:12px;">Investigator&rsquo;s explanation</h2>'
        + '<p style="font-size:14px; line-height:1.6;">' + esc(c.explanation) + '</p>'
      + '</div>'

      + '<div style="margin-bottom:10px;">'
        + '<h2 style="font-size:16px; border-bottom:1px solid #ddd; padding-bottom:6px; margin-bottom:12px;">Suggested improvements</h2>'
        + '<ol style="font-size:14px; line-height:1.6; padding-left:20px;">' + improvementsHtml + '</ol>'
      + '</div>'

      + '<div style="margin-top:30px; padding-top:14px; border-top:1px solid #ccc; font-size:11px; color:#888; text-align:center;">'
        + 'Marketing Detective &mdash; all companies, campaigns, and figures referenced are fictional and created for instructional purposes only.'
      + '</div>'
      + '</div>';

    document.getElementById("printReport").innerHTML = html;
    window.print();
  }
  window.downloadPdfReport = downloadPdfReport;

  function chartTile(label, value, pct){
    return '<div class="chart-tile"><div class="k">' + esc(label) + '</div>'
      + '<div class="bar-track"><div class="bar-fill" data-pct="' + pct + '"></div></div>'
      + '<div class="val">' + esc(value) + '</div></div>';
  }

  /* =========================================================
     UTIL
  ========================================================= */
  function esc(s){
    var d = document.createElement("div");
    d.textContent = (s === undefined || s === null) ? "" : String(s);
    return d.innerHTML;
  }

  /* =========================================================
     MASTER RENDER
  ========================================================= */
  function render(){
    renderProgress();
    var html = "";
    switch(STEPS[state.step]){
      case "briefing": html = renderBriefing(); break;
      case "assignment": html = renderAssignment(); break;
      case "board": html = renderBoard(); break;
      case "report": html = renderReport(); break;
    }
    app.innerHTML = html;
    window.scrollTo({top:0, behavior:"smooth"});

    if(STEPS[state.step] === "board"){
      requestAnimationFrame(enableDragging);
    }
    if(STEPS[state.step] === "report"){
      requestAnimationFrame(function(){
        document.querySelectorAll(".bar-fill").forEach(function(el){
          var pct = el.getAttribute("data-pct");
          requestAnimationFrame(function(){ el.style.width = pct + "%"; });
        });
      });
    }
  }

  render();
})();
</script>

</body>
</html>
